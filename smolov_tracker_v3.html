<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smolov Jr. Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#e8ff00;
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;
  --text:#f0f0f0;--muted:#555;--card:#161616;
  --red:#ff4d00;--purple:#b47cff;--green:#00ff9d;--orange:#ff9d00;--pink:#ff4d8b;--cyan:#00e5ff;
}
[data-theme="light"]{
  --bg:#f4f4f4;--surface:#fff;--surface2:#e8e8e8;--border:#ddd;
  --text:#111;--muted:#888;--card:#fafafa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;gap:8px;padding:12px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;flex-wrap:wrap;}
.athlete-tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.athlete-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;
  border:2px solid var(--border);background:transparent;color:var(--muted);transition:.2s;}
.athlete-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(232,255,0,.08);}
.athlete-chip .chip-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.athlete-chip .chip-del{font-size:14px;opacity:.4;margin-left:2px;line-height:1;}
.athlete-chip .chip-del:hover{opacity:1;color:var(--red);}
.add-btn{width:32px;height:32px;border-radius:50%;border:2px dashed var(--muted);
  background:transparent;color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;}
.add-btn:hover{border-color:var(--text);color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.theme-toggle{background:transparent;border:1px solid var(--border);border-radius:20px;
  padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;transition:.2s;}
.theme-toggle:hover{border-color:var(--text);color:var(--text);}
.sync-status{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-dot.loading{background:var(--orange);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── NAV ── */
nav{display:flex;gap:3px;padding:10px 16px 0;flex-wrap:wrap;}
.tab{padding:7px 13px;border-radius:4px 4px 0 0;font-size:10px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  background:var(--surface);color:var(--muted);
  border:1px solid var(--border);border-bottom:none;transition:.2s;}
.tab.active{background:var(--surface2);color:var(--accent);border-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}

main{padding:16px;max-width:960px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}

/* ── HERO ── */
.hero{padding:24px 0 16px;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,68px);line-height:.9;}
.hero h1 span{color:var(--accent);}
.hero p{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:1px;}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:14px 0;}
.stat-card{background:var(--surface);border-radius:4px;padding:12px;border-left:3px solid var(--accent);}
.stat-card .label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.stat-card .value{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);margin-top:3px;}
.stat-card .sub{font-size:9px;color:var(--accent);margin-top:1px;}

/* ── PROG BAR ── */
.prog-bar-wrap{margin-bottom:12px;}
.prog-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;}
.prog-bar-label span:first-child{color:var(--muted);letter-spacing:1px;}
.prog-bar-label span:last-child{color:var(--accent);font-weight:600;}
.prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.prog-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .6s;}

/* ── SCHEDULE ── */
.schedule-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:10px;}
.sched-card{background:var(--surface);border-radius:4px;padding:12px;border-top:2px solid var(--accent);}
.sched-week{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.sched-title{font-family:'Bebas Neue',sans-serif;font-size:17px;margin-top:3px;}
.sched-items{margin-top:5px;font-size:10px;color:var(--muted);line-height:1.8;}

/* ── DAY CARDS ── */
.day-card{background:var(--surface);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.day-header{display:flex;justify-content:space-between;align-items:center;
  padding:11px 16px;background:var(--surface2);cursor:pointer;user-select:none;}
.day-header h3{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;}
.badge{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:3px 7px;border-radius:2px;}
.day-body{padding:12px 16px;display:none;}
.day-body.open{display:block;}

/* ── SMOLOV BOX ── */
.smolov-box{background:rgba(232,255,0,.04);border:1px solid rgba(232,255,0,.12);
  border-radius:4px;padding:12px;margin-bottom:12px;}
.smolov-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);margin-bottom:8px;}
.input-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:center;}
.input-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  text-align:center;margin-bottom:2px;}
.target-pill{background:rgba(232,255,0,.1);border:1px solid rgba(232,255,0,.2);
  color:var(--accent);border-radius:3px;padding:5px 6px;font-size:11px;font-weight:600;text-align:center;}
input[type=number],input[type=text],input[type=password]{
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--text);padding:6px 7px;font-size:12px;width:100%;
  font-family:'DM Sans',sans-serif;text-align:center;transition:.2s;}
input:focus{outline:none;border-color:var(--accent);}
.e1rm-pill{background:var(--bg);border:1px solid var(--border);border-radius:3px;
  padding:6px 7px;font-size:11px;color:var(--accent);font-weight:600;
  text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center;}

/* ── ACCESSORIES ── */
.acc-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 70px;gap:6px;
  font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  margin-bottom:5px;margin-top:12px;}
.acc-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 70px;gap:6px;
  align-items:center;margin-bottom:6px;}
.ex-name{font-size:12px;font-weight:500;}

/* ── VOLUME BOX ── */
.volume-box{background:var(--surface2);border-radius:4px;padding:10px 14px;
  margin-top:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.volume-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.volume-value{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
.volume-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── SAVE ── */
.save-btn{margin-top:12px;background:var(--accent);color:#000;border:none;
  padding:8px 20px;border-radius:4px;font-weight:700;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;}
.save-btn:hover{opacity:.85;}
.save-msg{font-size:10px;color:var(--green);margin-left:8px;opacity:0;transition:.4s;}
.save-msg.show{opacity:1;}

/* ── COLOUR PICKER ── */
.colour-section{margin-top:20px;background:var(--surface);border-radius:6px;padding:16px;}
.colour-title{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);margin-bottom:10px;}
.colour-swatches{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s;}
.swatch.active{border-color:var(--text);transform:scale(1.15);}
.colour-custom{display:flex;align-items:center;gap:8px;margin-top:10px;}
.colour-custom label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.colour-custom input[type=color]{width:36px;height:36px;border:none;border-radius:50%;
  cursor:pointer;background:none;padding:0;}

/* ── PR TABLE ── */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--accent);margin:18px 0 3px;}
.pr-table{width:100%;border-collapse:collapse;margin-top:10px;}
.pr-table th{background:var(--surface2);color:var(--accent);font-size:8px;
  letter-spacing:2px;text-transform:uppercase;padding:8px 10px;
  text-align:center;border:1px solid var(--border);}
.pr-table td{padding:8px 10px;border:1px solid var(--border);text-align:center;
  font-size:12px;background:var(--surface);}

/* ── NOTE CARDS ── */
.note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px;}
.note-card{background:var(--surface);border-radius:4px;padding:14px;border-left:3px solid var(--red);}
.note-card.green{border-left-color:var(--green);}
.note-card.accent{border-left-color:var(--accent);}
.note-card.purple{border-left-color:var(--purple);}
.note-card h4{font-family:'Bebas Neue',sans-serif;font-size:14px;margin-bottom:5px;}
.note-card p{font-size:11px;color:var(--muted);line-height:1.7;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);
  display:flex;align-items:center;justify-content:center;z-index:1000;display:none;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:8px;padding:28px;
  width:min(380px,90vw);border:1px solid var(--border);}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);margin-bottom:16px;}
.modal label{font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:5px;margin-top:12px;}
.modal input{text-align:left;padding:9px 12px;}
.modal-btns{display:flex;gap:8px;margin-top:20px;}
.modal-btn{flex:1;padding:10px;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;transition:.2s;}
.modal-btn.primary{background:var(--accent);color:#000;}
.modal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--muted);}
.modal-btn:hover{opacity:.85;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:16px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:.2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.pin-key{padding:12px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);
  font-size:16px;font-weight:600;cursor:pointer;text-align:center;transition:.2s;color:var(--text);}
.pin-key:hover{background:var(--border);}
.pin-key.del{color:var(--red);}
.pin-error{color:var(--red);font-size:11px;text-align:center;margin-top:6px;min-height:16px;}
.pin-locked-msg{display:flex;align-items:center;gap:8px;background:rgba(255,77,0,.08);
  border:1px solid rgba(255,77,0,.2);border-radius:4px;padding:10px 14px;margin-bottom:12px;}
.pin-locked-msg span{font-size:11px;color:var(--red);}

/* ── TARGET EDIT ── */
.target-edit-wrap{display:flex;align-items:center;gap:8px;margin-top:6px;}
.target-edit-wrap label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.target-edit-wrap input{width:80px;font-family:'Bebas Neue',sans-serif;font-size:18px;
  color:var(--accent);text-align:center;border-color:var(--accent);}

@media(max-width:500px){
  .acc-row,.acc-header{grid-template-columns:1fr 1fr;}
  .ex-name{grid-column:1/-1;}
  .input-grid-5{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- MODALS -->
<div class="modal-overlay" id="modal-add-athlete">
  <div class="modal">
    <h2>Add Athlete</h2>
    <label>Name</label>
    <input type="text" id="new-athlete-name" placeholder="e.g. Alex" maxlength="20">
    <label>Current Bench PR (kg)</label>
    <input type="number" id="new-athlete-pr" step="0.5" placeholder="e.g. 80">
    <label>Accent Colour</label>
    <div class="colour-swatches" id="new-athlete-swatches" style="margin-top:6px"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal('modal-add-athlete')">Cancel</button>
      <button class="modal-btn primary" onclick="confirmAddAthlete()">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-delete-athlete">
  <div class="modal">
    <h2>Delete Athlete</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px"
       id="delete-confirm-text">This will permanently delete all data for this athlete.</p>
    <div id="delete-pin-area"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal('modal-delete-athlete')">Cancel</button>
      <button class="modal-btn primary" style="background:var(--red)"
              id="delete-confirm-btn" onclick="confirmDeleteAthlete()">Delete</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-pin">
  <div class="modal">
    <h2 id="pin-modal-title">Enter PIN</h2>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px" id="pin-modal-sub"></p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`
        <button class="pin-key${k==='⌫'?' del':''}" onclick="pinKey('${k}')">${k}</button>
      `).join('')}
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="modal-btn secondary" onclick="closePinModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="athlete-tabs" id="athlete-tabs"></div>
  <button class="add-btn" onclick="openAddAthlete()" title="Add athlete">+</button>
  <div class="topbar-right">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">—</span>
    </div>
  </div>
</div>

<nav>
  <div class="tab active" onclick="showPage('dashboard',event)">Dashboard</div>
  <div class="tab" onclick="showPage('week1',event)">Week 1</div>
  <div class="tab" onclick="showPage('week2',event)">Week 2</div>
  <div class="tab" onclick="showPage('week3',event)">Week 3</div>
  <div class="tab" onclick="showPage('deload',event)">Deload & PR</div>
  <div class="tab" onclick="showPage('tracker',event)">PR Tracker</div>
</nav>

<main>
  <div id="page-dashboard" class="page active"></div>
  <div id="page-week1" class="page"></div>
  <div id="page-week2" class="page"></div>
  <div id="page-week3" class="page"></div>
  <div id="page-deload" class="page"></div>
  <div id="page-tracker" class="page"></div>
</main>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = "https://sorzrdphywjzyrgelgvs.supabase.co";
const SUPABASE_KEY = "sb_publishable_kDrH6TN4OHnOoyf1zufX7g_KagChtzn";

const PRESET_COLOURS = [
  "#e8ff00","#00e5ff","#ff4d00","#b47cff","#00ff9d",
  "#ff9d00","#ff4d8b","#ffffff","#60a5fa","#f472b6"
];

const DEFAULT_ATHLETES = [
  { id:"josh", name:"Josh", pr:65,  colour:"#e8ff00" },
  { id:"ross", name:"Ross", pr:90,  colour:"#00e5ff" },
];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let athletes    = [];
let currentId   = "";
let db          = {};
let saveTimer   = null;
let pinSessions = {}; // { athleteId: expiryTimestamp }
let pendingPinAction = null;
let pinBuffer   = "";
let newAthleteColour = PRESET_COLOURS[0];

// ═══════════════════════════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════════════════════════
function setSyncStatus(state,text){
  document.getElementById("sync-dot").className = "sync-dot "+state;
  document.getElementById("sync-text").textContent = text;
}

async function dbFetch(id){
  setSyncStatus("loading","syncing…");
  try{
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/workouts?athlete=eq.${encodeURIComponent(id)}&select=data`,
      {headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}}
    );
    if(!r.ok) throw new Error(r.status);
    const rows = await r.json();
    db[id] = rows.length ? rows[0].data : {};
    setSyncStatus("ok","synced");
  }catch{
    setSyncStatus("err","offline");
    db[id] = db[id]||{};
  }
  return db[id];
}

async function dbSave(id){
  setSyncStatus("loading","saving…");
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/workouts`,{
      method:"POST",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,
        "Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({id,athlete:id,data:db[id],updated_at:new Date().toISOString()})
    });
    if(!r.ok) throw new Error(r.status);
    setSyncStatus("ok","saved ✓");
  }catch{setSyncStatus("err","save failed");}
}

async function saveAthletesMeta(){
  // store athlete list in a special "meta" row
  setSyncStatus("loading","saving…");
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/workouts`,{
      method:"POST",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,
        "Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({id:"__meta__",athlete:"__meta__",
        data:{athletes},updated_at:new Date().toISOString()})
    });
    setSyncStatus("ok","saved ✓");
  }catch{setSyncStatus("err","save failed");}
}

async function loadAthletesMeta(){
  try{
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/workouts?athlete=eq.__meta__&select=data`,
      {headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}}
    );
    if(!r.ok) throw new Error();
    const rows = await r.json();
    if(rows.length && rows[0].data.athletes){
      athletes = rows[0].data.athletes;
      return true;
    }
  }catch{}
  return false;
}

// ═══════════════════════════════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════════════════════════════
function get(key){ return db[currentId]?.[key] ?? ""; }
function set(key,val){
  if(!db[currentId]) db[currentId]={};
  db[currentId][key]=val;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>dbSave(currentId),1200);
}

function getAthlete(id){ return athletes.find(a=>a.id===id); }
function currentAthlete(){ return getAthlete(currentId); }
function accentColor(){ return currentAthlete()?.colour||"#e8ff00"; }

function applyAccent(col){
  document.documentElement.style.setProperty("--accent",col);
}

// ═══════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme")==="dark";
  html.setAttribute("data-theme", isDark?"light":"dark");
  document.getElementById("theme-btn").textContent = isDark?"🌙 Dark":"☀️ Light";
  set("theme", isDark?"light":"dark");
}

function applyTheme(){
  const t = get("theme")||"dark";
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("theme-btn").textContent = t==="dark"?"☀️ Light":"🌙 Dark";
}

// ═══════════════════════════════════════════════════════════
//  PIN SYSTEM
// ═══════════════════════════════════════════════════════════
function isPinUnlocked(id){
  const exp = pinSessions[id];
  return exp && Date.now() < exp;
}

function unlockPin(id){ pinSessions[id] = Date.now() + 5*60*1000; }

function hasPin(id){ return !!(db[id]?.["__pin__"]); }

// open pin modal — mode: "set"|"verify"|"verify-delete"
function openPinModal(mode, athleteId, onSuccess){
  pinBuffer="";
  pendingPinAction = {mode, athleteId, onSuccess};
  updatePinDots();
  document.getElementById("pin-error").textContent="";

  const title = document.getElementById("pin-modal-title");
  const sub   = document.getElementById("pin-modal-sub");
  if(mode==="set"){
    title.textContent="Set PIN";
    sub.textContent="Choose a 4-digit PIN to protect your data.";
  } else {
    title.textContent="Enter PIN";
    sub.textContent=`Enter ${getAthlete(athleteId)?.name||""}'s PIN to continue.`;
  }
  openModal("modal-pin");
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById(`pd${i}`).className =
      "pin-dot"+(i<pinBuffer.length?" filled":"");
  }
}

function pinKey(k){
  if(k==="⌫"||k===""){
    pinBuffer = pinBuffer.slice(0,-1);
    updatePinDots();
    return;
  }
  if(pinBuffer.length>=4) return;
  pinBuffer += k;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(submitPin,120);
}

function submitPin(){
  const {mode,athleteId,onSuccess} = pendingPinAction||{};
  if(mode==="set"){
    // store hashed pin (simple — just store as-is for this use case)
    if(!db[athleteId]) db[athleteId]={};
    db[athleteId]["__pin__"] = pinBuffer;
    dbSave(athleteId);
    unlockPin(athleteId);
    closeModal("modal-pin");
    if(onSuccess) onSuccess();
  } else {
    const stored = db[athleteId]?.["__pin__"];
    if(pinBuffer===stored){
      unlockPin(athleteId);
      closeModal("modal-pin");
      if(onSuccess) onSuccess();
    } else {
      document.getElementById("pin-error").textContent="Incorrect PIN";
      pinBuffer="";
      updatePinDots();
    }
  }
}

function closePinModal(){
  pendingPinAction=null;
  pinBuffer="";
  closeModal("modal-pin");
}

// Guard for destructive actions
function requirePin(id, action){
  if(!hasPin(id)){
    // no pin set — ask if they want to set one first or just proceed
    action();
    return;
  }
  if(isPinUnlocked(id)){
    action();
    return;
  }
  openPinModal("verify", id, action);
}

async function confirmAddAthlete(){
  const name = document.getElementById("new-athlete-name").value.trim();
  const pr   = parseFloat(document.getElementById("new-athlete-pr").value);
  if(!name||!pr){ alert("Please enter name and PR."); return; }

  const id = name.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now();
  athletes.push({id, name, pr, colour: newAthleteColour});
  await saveAthletesMeta();
  await dbFetch(id);

  await switchAthlete(id);
}

let athleteToDelete = null;

function tryDeleteAthlete(id){
  if(athletes.length<=1){ alert("Cannot delete the last athlete."); return; }
  athleteToDelete = id;
  const a = getAthlete(id);
  document.getElementById("delete-confirm-text").textContent =
    `Delete all data for ${a.name}? This cannot be undone.`;

  const pinArea = document.getElementById("delete-pin-area");
  if(hasPin(id) && !isPinUnlocked(id)){
    pinArea.innerHTML=`
      <div class="pin-locked-msg">
        <span>🔒 ${a.name}'s PIN is required to delete.</span>
      </div>`;
    document.getElementById("delete-confirm-btn").style.display="none";
    // show a mini verify flow inline
    pinArea.innerHTML += `
      <label style="font-size:10px;letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px">ENTER PIN</label>
      <input type="password" maxlength="4" inputmode="numeric"
        id="delete-pin-input" placeholder="••••"
        style="width:100px;text-align:center;font-size:18px;letter-spacing:6px">
      <div style="font-size:11px;color:var(--red);margin-top:4px" id="delete-pin-err"></div>`;
    document.getElementById("delete-confirm-btn").style.display="";
    document.getElementById("delete-confirm-btn").onclick = verifyAndDelete;
  } else {
    pinArea.innerHTML="";
    document.getElementById("delete-confirm-btn").style.display="";
    document.getElementById("delete-confirm-btn").onclick = confirmDeleteAthlete;
  }
  openModal("modal-delete-athlete");
}

function verifyAndDelete(){
  const input = document.getElementById("delete-pin-input")?.value;
  const stored = db[athleteToDelete]?.["__pin__"];
  if(input!==stored){
    document.getElementById("delete-pin-err").textContent="Incorrect PIN";
    return;
  }
  confirmDeleteAthlete();
}

async function confirmDeleteAthlete(){
  if(!athleteToDelete) return;
  // delete from supabase
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/workouts?athlete=eq.${encodeURIComponent(athleteToDelete)}`,{
      method:"DELETE",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}
    });
  }catch{}

  athletes = athletes.filter(a=>a.id!==athleteToDelete);
  delete db[athleteToDelete];
  athleteToDelete=null;
  await saveAthletesMeta();
  closeModal("modal-delete-athlete");
  await switchAthlete(athletes[0].id);
}

function smolovWeight(weekIdx, day, athletePr){
  const pcts={Monday:[.70,.70,.70],Wednesday:[.76,.76,.76],
              Friday:[.81,.81,.81],Saturday:[.85,.85,.85]};
  const pct = pcts[day]?.[weekIdx];
  if(!pct) return null;
  return Math.round((athletePr*pct + weekIdx*2.5)*2)/2;
}

function e1rm(w,r){
  if(!w||!r) return "—";
  return (parseFloat(w)*(1+parseFloat(r)/30)).toFixed(1)+" kg";
}

// Volume calculator for a session
function calcVolume(weekKey, day){
  let total=0;
  // bench
  const bw=parseFloat(get(`${weekKey}-${day}-bench-wt`));
  const br=parseFloat(get(`${weekKey}-${day}-bench-reps`));
  const bs = SMOLOV_SCHEMES[day];
  if(bw&&br&&bs){
    const sets=parseInt(bs.split("×")[0]);
    total+=bw*br*sets;
  }
  // accessories
  (ACCESSORIES[day]||[]).forEach((ex,i)=>{
    const w=parseFloat(get(`${weekKey}-${day}-ex${i}-wt`));
    const r=parseFloat(get(`${weekKey}-${day}-ex${i}-reps`));
    if(w&&r){
      const setsMatch = ex.s.match(/^(\d+)×/);
      const sets = setsMatch ? parseInt(setsMatch[1]) : 3;
      total+=w*r*sets;
    }
  });
  return total>0 ? total.toLocaleString()+" kg" : "—";
}

    <p>Log weights, reps and RPE · auto-saves to cloud</p>

  for(const day of DAYS){
    const acc=ACCESSORIES[day]||[];
    const scheme=SMOLOV_SCHEMES[day];

    if(isBenchDay){
      const wKey=`${weekKey}-${day}-bench-wt`;
      const rKey=`${weekKey}-${day}-bench-reps`;
      const pKey=`${weekKey}-${day}-bench-rpe`;

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
            <input type="number" step="0.5" placeholder="kg" id="${wk2}" value="${get(wk2)}"
              onchange="set('${wk2}',this.value);refreshE1rm('${weekKey}','${day}','ex${i}');refreshVol('${weekKey}','${day}')">
            <input type="number" placeholder="reps" id="${rk2}" value="${get(rk2)}"
              onchange="set('${rk2}',this.value);refreshE1rm('${weekKey}','${day}','ex${i}');refreshVol('${weekKey}','${day}')">
          </div>
          <input type="number" step="0.5" min="1" max="10" placeholder="RPE" id="${pk2}" value="${get(pk2)}"
            onchange="set('${pk2}',this.value)">
          <div class="e1rm-pill" id="${weekKey}-${day}-ex${i}-e1rm" style="font-size:11px">
            ${e1rm(get(wk2),get(rk2))}</div>
        </div>`;
      });
    }

    html+=`
      <div class="volume-box">
        <div>
          <div class="volume-label">Session Volume</div>
          <div class="volume-value" id="vol-display-${weekKey}-${day}">${calcVolume(weekKey,day)}</div>
          <div class="volume-sub">total kg lifted this session</div>
        </div>
      </div>
      <button class="save-btn" onclick="saveDay('${weekKey}','${day}')">Save Session</button>
      <span class="save-msg" id="msg-${weekKey}-${day}">✓ Saved to cloud</span>
      </div></div>`;
  }

  container.innerHTML=html;
  // init vol badges
  DAYS.forEach(d=>refreshVol(weekKey,d));
}

function toggleDay(id){
  document.getElementById(`body-${id}`)?.classList.toggle("open");
}

function refreshE1rm(week,day,prefix){
  const w=document.getElementById(`${week}-${day}-${prefix}-wt`)?.value;
  const r=document.getElementById(`${week}-${day}-${prefix}-reps`)?.value;
  const el=document.getElementById(`${week}-${day}-${prefix}-e1rm`);
  if(el) el.textContent=e1rm(w,r);
  updateDashboard();
}

function refreshVol(week,day){
  const v=calcVolume(week,day);
  const disp=document.getElementById(`vol-display-${week}-${day}`);
  const badge=document.getElementById(`vol-${week}-${day}`);
  if(disp) disp.textContent=v;
  if(badge && v!=="—") badge.textContent=v;
}

function saveDay(week,day){
  const msg=document.getElementById(`msg-${week}-${day}`);
  if(msg){msg.classList.add("show");setTimeout(()=>msg.classList.remove("show"),2500);}
}

// ═══════════════════════════════════════════════════════════
//  DELOAD PAGE
// ═══════════════════════════════════════════════════════════
function buildDeloadPage(){
  const container=document.getElementById("page-deload");
  if(!container||container.dataset.built) return;
  container.dataset.built="1";
  const a=currentAthlete();
  const pr=a.pr;

  container.innerHTML=`
  <div class="hero" style="padding-top:14px">
    <h1 style="font-size:clamp(30px,5vw,52px)">DELOAD &<br><span>PR TEST</span></h1>
    <p>Week 4 — recover then test</p>
  </div>
  <div class="schedule-grid">
    <div class="sched-card"><div class="sched-week">Monday</div><div class="sched-title">3×3</div>
      <div class="sched-items">${smolovWeight(2,"Saturday",pr)-5}kg · groove only</div></div>
    <div class="sched-card"><div class="sched-week">Tuesday</div><div class="sched-title">LIGHT BACK</div>
      <div class="sched-items">Pulldowns + curls<br>No deadlift</div></div>
    <div class="sched-card"><div class="sched-week">Wednesday</div><div class="sched-title">3×2</div>
      <div class="sched-items">${smolovWeight(2,"Saturday",pr)-2.5}kg · last touch</div></div>
    <div class="sched-card" style="border-top-color:var(--red)"><div class="sched-week">Thu/Fri</div>
      <div class="sched-title">FULL REST</div>
      <div class="sched-items">Eat big, sleep 8+hrs<br>Visualise the lift</div></div>
  </div>

  <div class="section-title" style="margin-top:16px">Saturday Warmup</div>
  <div style="background:var(--surface);border-radius:6px;overflow:hidden;margin-top:8px">
    ${[
      ["Empty bar","×10","Groove"],
      [Math.round(pr*.6)+" kg","×6",""],
      [Math.round(pr*.75)+" kg","×4",""],
      [Math.round(pr*.88)+" kg","×2",""],
      [pr+" kg","×1","Current PR feel — REST 5 mins"],
      [Math.round(pr*1.04)+" kg","×1","First attempt"],
      [Math.round(pr*1.08)+" kg","×1","Target"],
      [Math.round(pr*1.12)+" kg","×1","Optimistic"],
      [Math.round(pr*1.18)+" kg","×1","Best case goal 🏆"],
    ].map(([wt,reps,note])=>{
      const isAttempt=reps==="×1";
      return `<div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;
        padding:9px 16px;background:${isAttempt?`${accentColor()}08`:'var(--surface)'};
        border-bottom:1px solid var(--border);align-items:center">
        <div style="font-weight:${isAttempt?700:400};color:${isAttempt?'var(--accent)':'var(--text)'};font-size:13px">${wt}</div>
        <div style="font-size:11px;color:${isAttempt?'var(--accent)':'var(--muted)'}">${reps}</div>
        <div style="font-size:10px;color:var(--muted)">${note}</div>
      </div>`;
    }).join("")}
  </div>

  <div class="section-title" style="margin-top:16px">Log PR Test</div>
  <div style="background:var(--surface);border-radius:6px;padding:16px;margin-top:8px;
    border:1px solid var(--accent)">
    <div style="font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:8px">
      NEW 1RM — ${a.name.toUpperCase()}
    </div>
    <input type="number" step="0.5" placeholder="kg" value="${get('pr-1')}"
      style="background:var(--bg);border:2px solid var(--accent);color:var(--accent);
      font-family:'Bebas Neue',sans-serif;font-size:32px;padding:10px 14px;
      border-radius:4px;width:180px;text-align:center"
      onchange="set('pr-1',this.value);updateDashboard()">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);margin-left:6px">kg</span>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  PR TRACKER
// ═══════════════════════════════════════════════════════════
function buildTrackerPage(){
  const container=document.getElementById("page-tracker");
  if(!container||container.dataset.built) return;
  container.dataset.built="1";
  const a=currentAthlete();
  const milestones=["Pre-program","Post Block 1","Post Block 2","Post Block 3","Post Block 4"];

  container.innerHTML=`
  <div class="hero" style="padding-top:14px">
    <h1 style="font-size:clamp(30px,5vw,52px)">PR <span>TRACKER</span></h1>
    <p>${a.name} · log PRs after each deload test</p>
  </div>
  <table class="pr-table">
    <thead><tr>
      <th style="text-align:left">Milestone</th><th>1RM</th><th>Change</th>
    </tr></thead>
    <tbody>
      ${milestones.map((label,i)=>`
      <tr>
        <td style="text-align:left;font-size:11px;color:var(--muted)">${label}</td>
        <td>
          <input type="number" step="0.5" value="${get(`pr-${i}`)|| (i===0?a.pr:'')}" placeholder="kg"
            id="pr-input-${i}"
            style="background:var(--bg);border:1px solid var(--accent);color:var(--accent);
            font-weight:700;font-size:14px;padding:5px;border-radius:3px;width:75px;text-align:center"
            onchange="set('pr-${i}',this.value);updatePRDiffs()">
        </td>
        <td id="pr-diff-${i}" style="color:var(--green);font-weight:700;font-size:12px">—</td>
      </tr>`).join("")}
    </tbody>
  </table>`;

  updatePRDiffs();
}

function updatePRDiffs(){
  for(let i=1;i<5;i++){
    const curr=parseFloat(document.getElementById(`pr-input-${i}`)?.value);
    const prev=parseFloat(document.getElementById(`pr-input-${i-1}`)?.value);
    const el=document.getElementById(`pr-diff-${i}`);
    if(!el) continue;
    if(curr&&prev){
      const d=(curr-prev).toFixed(1);
      el.textContent=d>0?`+${d} kg`:`${d} kg`;
      el.style.color=d>0?"var(--green)":"var(--red)";
    } else el.textContent="—";
  }
}

// ═══════════════════════════════════════════════════════════
//  PAGE ROUTING
// ═══════════════════════════════════════════════════════════
function rerenderAll(){
  ["week1","week2","week3","deload","tracker"].forEach(id=>{
    const el=document.getElementById(`page-${id}`);
    if(el){el.innerHTML="";el.dataset.built="";}
  });
  const active=document.querySelector(".page.active");
  if(active&&active.id!=="page-dashboard"){
    buildPage(active.id.replace("page-",""));
  }
}

function buildPage(id){
  if(["week1","week2","week3"].includes(id)) buildWeekPage(id);
  if(id==="deload") buildDeloadPage();
  if(id==="tracker") buildTrackerPage();
}

function showPage(id,evt){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(`page-${id}`)?.classList.add("active");
  if(evt) evt.target.classList.add("active");
  buildPage(id);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async()=>{
  const loaded = await loadAthletesMeta();
  if(!loaded) athletes=[...DEFAULT_ATHLETES];
  currentId = athletes[0].id;
  await dbFetch(currentId);
  // prefetch others in background
  athletes.slice(1).forEach(a=>dbFetch(a.id));
  applyAccent(accentColor());
  applyTheme();
  renderAthleteChips();
  updateDashboard();
})();
</script>
