<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --ac:#e8ff00;--bg:#0a0a0a;--sf:#111;--sf2:#1a1a1a;--bd:#222;
  --tx:#f0f0f0;--mu:#555;
  --red:#ff4d00;--pu:#b47cff;--gn:#00ff9d;--or:#ff9d00;--pk:#ff4d8b;--cy:#00e5ff;
}
[data-theme=light]{--bg:#f0f0f0;--sf:#fff;--sf2:#e4e4e4;--bd:#ccc;--tx:#111;--mu:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .3s,color .3s;}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:7px;padding:9px 13px;background:var(--sf);
  border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:300;flex-wrap:wrap;}
.athlete-tabs{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;
  border:2px solid var(--bd);background:transparent;color:var(--mu);transition:.2s;}
.chip.active{border-color:var(--ac);color:var(--ac);background:rgba(232,255,0,.07);}
.chip-dot{width:7px;height:7px;border-radius:50%;}
.chip-del{font-size:13px;opacity:.3;margin-left:2px;cursor:pointer;}
.chip-del:hover{opacity:1;color:var(--red);}
.add-btn{width:28px;height:28px;border-radius:50%;border:2px dashed var(--mu);
  background:transparent;color:var(--mu);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;}
.add-btn:hover{border-color:var(--tx);color:var(--tx);}
.tb-right{display:flex;align-items:center;gap:7px;margin-left:auto;flex-wrap:wrap;}
.icon-btn{background:transparent;border:1px solid var(--bd);border-radius:14px;
  padding:4px 9px;font-size:11px;color:var(--mu);cursor:pointer;transition:.2s;}
.icon-btn:hover{border-color:var(--tx);color:var(--tx);}
.streak{display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,157,0,.1);border:1px solid rgba(255,157,0,.2);
  border-radius:12px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--or);}
.sync-wrap{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--mu);}
.sdot.ok{background:var(--gn);}.sdot.err{background:var(--red);}
.sdot.spin{background:var(--or);animation:pu 1s infinite;}
@keyframes pu{0%,100%{opacity:1;}50%{opacity:.2;}}

/* MAIN NAV */
.main-nav{display:flex;gap:2px;padding:8px 13px 0;flex-wrap:wrap;background:var(--sf);
  border-bottom:1px solid var(--bd);}
.mtab{padding:6px 11px;border-radius:4px 4px 0 0;font-size:10px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  background:var(--bg);color:var(--mu);border:1px solid var(--bd);border-bottom:none;transition:.2s;}
.mtab.active{background:var(--sf2);color:var(--ac);border-color:var(--ac);}
.mtab:hover:not(.active){color:var(--tx);}
.mtab.add-prog{color:var(--gn);border-color:rgba(0,255,157,.3);}
.mtab.add-prog:hover{background:rgba(0,255,157,.05);}

/* SUB NAV */
.sub-nav{display:flex;gap:2px;padding:6px 13px 0;flex-wrap:wrap;
  background:var(--sf2);border-bottom:1px solid var(--bd);}
.stab{padding:5px 10px;border-radius:3px 3px 0 0;font-size:9px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  background:var(--bg);color:var(--mu);border:1px solid var(--bd);border-bottom:none;transition:.2s;}
.stab.active{background:var(--sf);color:var(--ac);border-color:var(--ac);}
.stab:hover:not(.active){color:var(--tx);}

main{padding:13px;max-width:1000px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.sub-page{display:none;}.sub-page.active{display:block;}

/* HERO */
.hero{padding:18px 0 12px;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,58px);line-height:.9;}
.hero h1 span{color:var(--ac);}
.hero-sub{color:var(--mu);font-size:11px;margin-top:5px;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:6px;margin:10px 0;}
.sc{background:var(--sf);border-radius:4px;padding:10px;border-left:3px solid var(--ac);}
.sc .l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);}
.sc .v{font-family:'Bebas Neue',sans-serif;font-size:21px;color:var(--tx);margin-top:2px;}
.sc .s{font-size:9px;color:var(--ac);margin-top:1px;}

/* PROG BARS */
.pb-wrap{margin-bottom:9px;}
.pb-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;}
.pb-label span:first-child{color:var(--mu);}
.pb-label span:last-child{color:var(--ac);font-weight:600;}
.pb{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .5s;}

/* SECTION TITLE */
.sec{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;
  color:var(--ac);margin:16px 0 3px;}

/* SCHEDULE CARDS */
.sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:7px;}
.sched-card{background:var(--sf);border-radius:4px;padding:10px;border-top:2px solid var(--ac);}
.sched-wk{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);}
.sched-t{font-family:'Bebas Neue',sans-serif;font-size:15px;margin-top:2px;}
.sched-i{margin-top:4px;font-size:10px;color:var(--mu);line-height:1.8;}

/* NOTE CARDS */
.note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px;margin-top:9px;}
.nc{background:var(--sf);border-radius:4px;padding:12px;border-left:3px solid var(--red);}
.nc.g{border-left-color:var(--gn);}.nc.a{border-left-color:var(--ac);}.nc.p{border-left-color:var(--pu);}
.nc h4{font-family:'Bebas Neue',sans-serif;font-size:13px;margin-bottom:4px;}
.nc p{font-size:11px;color:var(--mu);line-height:1.6;}

/* DAY CARD */
.day-card{background:var(--sf);border-radius:5px;overflow:hidden;margin-bottom:7px;}
.day-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;background:var(--sf2);cursor:pointer;user-select:none;}
.day-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;}
.badge{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
.day-body{padding:11px 13px;display:none;}
.day-body.open{display:block;}

/* SET TABLE */
.set-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.set-table th{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--mu);padding:4px 5px;text-align:center;border-bottom:1px solid var(--bd);}
.set-table td{padding:3px 4px;text-align:center;vertical-align:middle;}
.set-table tr.best-set td{background:rgba(255,157,0,.06);}
.set-table tr.best-set .e1rm-cell{color:var(--or);font-weight:700;}
.set-table tr.best-set .e1rm-cell::after{content:" 🏆";font-size:10px;}
.set-num{font-size:11px;color:var(--mu);font-weight:600;width:24px;}
.ghost-val{font-size:9px;color:var(--mu);font-style:italic;text-align:center;margin-top:1px;}
input[type=number],input[type=text],input[type=password],input[type=date],textarea,select{
  background:var(--bg);border:1px solid var(--bd);border-radius:3px;
  color:var(--tx);padding:5px 5px;font-size:12px;width:100%;
  font-family:'DM Sans',sans-serif;text-align:center;transition:.2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ac);}
textarea{text-align:left;resize:vertical;min-height:52px;}
select{cursor:pointer;}
.e1rm-cell{font-size:11px;color:var(--ac);font-weight:600;}
.del-set{background:transparent;border:none;color:var(--mu);cursor:pointer;font-size:14px;
  padding:2px 5px;transition:.2s;border-radius:3px;}
.del-set:hover{color:var(--red);background:rgba(255,77,0,.08);}
.add-set-btn{background:transparent;border:1px dashed var(--bd);border-radius:3px;
  padding:5px 10px;font-size:10px;color:var(--mu);cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.add-set-btn:hover{border-color:var(--ac);color:var(--ac);}

/* EXERCISE SEARCH */
.ex-search-wrap{position:relative;margin-bottom:8px;}
.ex-search-input{text-align:left;padding:7px 10px;}
.ex-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--sf);
  border:1px solid var(--ac);border-top:none;border-radius:0 0 4px 4px;
  max-height:200px;overflow-y:auto;z-index:100;display:none;}
.ex-dropdown.open{display:block;}
.ex-option{padding:7px 10px;font-size:12px;cursor:pointer;transition:.2s;border-bottom:1px solid var(--bd);}
.ex-option:hover{background:rgba(232,255,0,.07);color:var(--ac);}
.add-ex-btn{background:transparent;border:1px dashed var(--gn);border-radius:4px;
  padding:6px 12px;font-size:10px;color:var(--gn);cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:5px;margin-top:6px;}
.add-ex-btn:hover{background:rgba(0,255,157,.05);}
.ex-block{background:var(--sf2);border-radius:4px;padding:10px;margin-bottom:8px;
  border:1px solid var(--bd);}
.ex-block-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.ex-block-name{font-size:13px;font-weight:600;}
.ex-block-del{background:transparent;border:none;color:var(--mu);cursor:pointer;font-size:13px;}
.ex-block-del:hover{color:var(--red);}

/* REST TIMER */
.rest-timer{display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap;}
.rt-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:4px;
  padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;color:var(--tx);transition:.2s;}
.rt-btn:hover{border-color:var(--ac);color:var(--ac);}
.rt-disp{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ac);min-width:45px;}
.rt-disp.done{color:var(--gn);}.rt-disp.urgent{color:var(--red);}

/* SESSION NOTES */
.sn-wrap{margin-top:9px;}
.sn-wrap label{font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);display:block;margin-bottom:3px;}

/* VOL BOX */
.vol-box{background:var(--sf2);border-radius:4px;padding:8px 12px;
  margin-top:9px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.vol-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);}
.vol-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ac);}
.vol-cmp{font-size:10px;margin-top:1px;}

/* SAVE */
.save-btn{margin-top:9px;background:var(--ac);color:#000;border:none;
  padding:7px 16px;border-radius:4px;font-weight:700;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;}
.save-btn:hover{opacity:.85;}
.save-msg{font-size:10px;color:var(--gn);margin-left:6px;opacity:0;transition:.4s;}
.save-msg.show{opacity:1;}

/* COLOUR */
.col-section{background:var(--sf);border-radius:5px;padding:12px;margin-top:10px;}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:.2s;display:inline-block;}
.swatch.active{border-color:var(--tx);transform:scale(1.15);}

/* PIN */
.pin-dots{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bd);transition:.2s;}
.pin-dot.filled{background:var(--ac);border-color:var(--ac);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:5px;}
.pk{padding:10px;border-radius:4px;background:var(--sf2);border:1px solid var(--bd);
  font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:.2s;color:var(--tx);}
.pk:hover{background:var(--bd);}.pk.del{color:var(--red);}
.pin-err{color:var(--red);font-size:11px;text-align:center;margin-top:4px;min-height:14px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;z-index:1000;}
.mo.open{display:flex;}
.md{background:var(--sf);border-radius:8px;padding:22px;
  width:min(380px,93vw);border:1px solid var(--bd);max-height:90vh;overflow-y:auto;}
.md h2{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--ac);margin-bottom:12px;}
.md label{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--mu);display:block;margin-bottom:3px;margin-top:9px;}
.md-btns{display:flex;gap:6px;margin-top:16px;}
.mb{flex:1;padding:8px;border-radius:4px;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;transition:.2s;}
.mb.pri{background:var(--ac);color:#000;}.mb.sec{background:transparent;border:1px solid var(--bd);color:var(--mu);}
.mb.danger{background:var(--red);color:#fff;}

/* CHARTS */
.chart-wrap{background:var(--sf);border-radius:5px;padding:12px;margin-top:9px;}
.chart-wrap canvas{max-height:200px;}

/* BODY SVG */
.body-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:9px;}
.body-panel{background:var(--sf);border-radius:5px;padding:10px;text-align:center;}
.body-panel h4{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}

/* PR TABLE */
.pr-table{width:100%;border-collapse:collapse;margin-top:9px;}
.pr-table th{background:var(--sf2);color:var(--ac);font-size:8px;letter-spacing:2px;
  text-transform:uppercase;padding:7px 9px;text-align:center;border:1px solid var(--bd);}
.pr-table td{padding:7px 9px;border:1px solid var(--bd);text-align:center;
  font-size:12px;background:var(--sf);}
.pr-table td input{width:70px;}

/* PROGRAM BUILDER */
.prog-template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:9px;}
.prog-tmpl{background:var(--sf);border-radius:4px;padding:12px;border:1px solid var(--bd);
  cursor:pointer;transition:.2s;}
.prog-tmpl:hover{border-color:var(--ac);}
.prog-tmpl.selected{border-color:var(--ac);background:rgba(232,255,0,.05);}
.prog-tmpl h4{font-family:'Bebas Neue',sans-serif;font-size:14px;margin-bottom:3px;}
.prog-tmpl p{font-size:10px;color:var(--mu);}

/* DND */
.dnd-day{background:var(--sf2);border-radius:4px;margin-bottom:6px;border:1px solid var(--bd);}
.dnd-day-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;cursor:move;user-select:none;}
.dnd-day-hdr span{font-family:'Bebas Neue',sans-serif;font-size:14px;}
.dnd-ex-list{padding:4px 8px 8px;}
.dnd-ex{display:flex;align-items:center;gap:6px;padding:5px 7px;
  background:var(--bg);border-radius:3px;margin-bottom:4px;cursor:move;
  border:1px solid var(--bd);font-size:12px;}
.dnd-ex .drag-handle{color:var(--mu);font-size:12px;cursor:move;}
.dnd-ex .ex-del{margin-left:auto;color:var(--mu);cursor:pointer;font-size:12px;}
.dnd-ex .ex-del:hover{color:var(--red);}

/* BW */
.bw-log-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;}
.bw-log-row input{flex:1;}

/* OFFLINE BANNER */
.offline-banner{background:rgba(255,77,0,.1);border-bottom:1px solid rgba(255,77,0,.2);
  padding:5px 13px;font-size:11px;color:var(--red);display:none;text-align:center;}
.offline-banner.show{display:block;}

/* CONFETTI */
.cf{position:fixed;width:7px;height:7px;border-radius:2px;
  animation:fall linear forwards;pointer-events:none;z-index:9999;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* EYE TOGGLE */
.eye-btn{background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--mu);
  padding:3px;transition:.2s;}
.eye-btn:hover{color:var(--tx);}

/* TARGET EDIT */
.te-wrap{display:flex;align-items:center;gap:6px;margin-top:5px;}
.te-wrap label{font-size:9px;letter-spacing:2px;color:var(--mu);text-transform:uppercase;}
.te-wrap input{width:72px;font-family:'Bebas Neue',sans-serif;font-size:16px;
  color:var(--ac);text-align:center;border-color:var(--ac);}

/* PRIMARY BADGE */
.primary-badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;
  border-radius:10px;background:rgba(232,255,0,.15);color:var(--ac);
  border:1px solid rgba(232,255,0,.3);}

@media(max-width:480px){
  .body-wrap{grid-template-columns:1fr;}
  .stats{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">⚠ Offline — changes saved locally and will sync when reconnected</div>

<!-- MODALS -->
<div class="mo" id="mo-add-athlete">
  <div class="md">
    <h2>Add Athlete</h2>
    <label>Name</label><input type="text" id="new-name" placeholder="e.g. Alex" maxlength="20">
    <label>Bench PR (kg)</label><input type="number" id="new-pr" step="0.5" placeholder="e.g. 80">
    <label>Accent Colour</label>
    <div id="new-swatches" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px"></div>
    <div class="md-btns">
      <button class="mb sec" onclick="closeModal('mo-add-athlete')">Cancel</button>
      <button class="mb pri" onclick="confirmAddAthlete()">Add</button>
    </div>
  </div>
</div>

<div class="mo" id="mo-del-athlete">
  <div class="md">
    <h2>Delete Athlete</h2>
    <p style="font-size:12px;color:var(--mu);margin-bottom:12px" id="del-text"></p>
    <div id="del-pin-area"></div>
    <div class="md-btns">
      <button class="mb sec" onclick="closeModal('mo-del-athlete')">Cancel</button>
      <button class="mb danger" id="del-btn" onclick="doDeleteAthlete()">Delete</button>
    </div>
  </div>
</div>

<div class="mo" id="mo-pin">
  <div class="md">
    <h2 id="pin-title">Enter PIN</h2>
    <p style="font-size:11px;color:var(--mu);margin-bottom:5px" id="pin-sub"></p>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-pad">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button>
      <button class="pk" onclick="pk('3')">3</button><button class="pk" onclick="pk('4')">4</button>
      <button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button>
      <button class="pk" onclick="pk('9')">9</button>
      <button class="pk" onclick="pk('')"></button>
      <button class="pk" onclick="pk('0')">0</button>
      <button class="pk del" onclick="pk('⌫')">⌫</button>
    </div>
    <div class="md-btns" style="margin-top:12px">
      <button class="mb sec" onclick="closePinModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="mo" id="mo-share">
  <div class="md">
    <h2>Session Summary</h2>
    <div id="share-content" style="background:var(--bg);border-radius:4px;padding:12px;
      margin-bottom:12px;font-size:11px;line-height:1.8;white-space:pre-wrap;font-family:monospace;
      max-height:300px;overflow-y:auto;"></div>
    <div class="md-btns">
      <button class="mb sec" onclick="closeModal('mo-share')">Close</button>
      <button class="mb pri" onclick="copyShare()">Copy Text</button>
    </div>
  </div>
</div>

<div class="mo" id="mo-add-program">
  <div class="md" style="max-width:500px;width:min(500px,95vw)">
    <h2>New Program</h2>
    <label>Program Name</label><input type="text" id="prog-name" placeholder="e.g. My PPL Block">
    <label>Notes</label><textarea id="prog-notes" placeholder="Goals, focus, anything…"></textarea>
    <label>Template</label>

function queueOp(table,method,payload,matchKey){
  offlineQueue.push({table,method,payload,matchKey,ts:Date.now()});
  localStorage.setItem("gym_queue",JSON.stringify(offlineQueue));
}

async function flushQueue(){
  const q=[...offlineQueue];offlineQueue=[];
  localStorage.setItem("gym_queue","[]");
  for(const op of q){
    try{
      await sbReq(op.table,op.method,op.payload,op.matchKey);
    }catch{offlineQueue.push(op);}
  }
  if(offlineQueue.length) localStorage.setItem("gym_queue",JSON.stringify(offlineQueue));
}

async function sbReq(table,method,payload,matchKey){
  let url=`${SB_URL}/rest/v1/${table}`;
  const opts={method,headers:{...HDR}};
  if(method==="GET"){
    if(matchKey) url+=`?${matchKey}`;
  } else if(method==="POST"){
    opts.headers["Prefer"]="resolution=merge-duplicates";
    opts.body=JSON.stringify(payload);
  } else if(method==="DELETE"){
    url+=`?${matchKey}`;
  }
  const r=await fetch(url,opts);
  if(!r.ok) throw new Error(r.status);
  return r.status===204?null:r.json();
}

async function dbFetch(id){
  ss("spin","syncing…");
  try{
    const rows=await sbReq("workouts","GET",null,`athlete=eq.${encodeURIComponent(id)}&select=data`);
    db[id]=rows.length?rows[0].data:{};
    ss("ok","synced");
  }catch{ss("err","offline");db[id]=db[id]||{};}
}

async function dbSave(id){
  const payload={id,athlete:id,data:db[id],updated_at:new Date().toISOString()};
  if(!isOnline){queueOp("workouts","POST",payload);ss("ok","queued");return;}
  ss("spin","saving…");
  try{await sbReq("workouts","POST",payload);ss("ok","saved ✓");}
  catch{ss("err","save failed");queueOp("workouts","POST",payload);}
}

async function bwFetch(id){
  try{
    const rows=await sbReq("bodyweight","GET",null,`athlete=eq.${encodeURIComponent(id)}&order=date.asc`);
    bwRows[id]=rows;
  }catch{bwRows[id]=bwRows[id]||[];}
}

async function bwSave(id,date,weight){
  const payload={athlete:id,date,weight_kg:parseFloat(weight)};
  if(!isOnline){queueOp("bodyweight","POST",payload);return;}
  try{
    // POST with upsert — on_conflict matches the unique(athlete,date) constraint
    const r=await fetch(`${SB_URL}/rest/v1/bodyweight?on_conflict=athlete,date`,{
      method:"POST",
      headers:{...HDR,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify(payload)
    });
    if(!r.ok){
      const txt=await r.text();
      throw new Error(`${r.status}: ${txt}`);
    }
  }catch(err){
    console.error("BW save failed:",err);
    queueOp("bodyweight","POST",payload);
  }
}

async function bwDelete(id,date){
  if(!isOnline) return;

}

function pinUnlocked(id){return pinSessions[id]&&Date.now()<pinSessions[id];}
function unlock(id){pinSessions[id]=Date.now()+5*60*1000;}
function hasPin(id){return !!(db[id]?.["__pin__"]);}

function openPin(mode,id,cb){
  pinBuf="";pendingPin={mode,id,cb};updateDots();
  document.getElementById("pin-err").textContent="";
  document.getElementById("pin-title").textContent=mode==="set"?"Set PIN":"Enter PIN";
  document.getElementById("pin-sub").textContent=mode==="set"
    ?"Choose a 4-digit PIN.":
    `Enter ${athletes.find(a=>a.id===id)?.name||""}'s PIN.`;
  openModal("mo-pin");
}

function updateDots(){for(let i=0;i<4;i++)document.getElementById(`pd${i}`).className="pin-dot"+(i<pinBuf.length?" filled":"");}

function pk(k){
  if(k==="⌫"||k===""){pinBuf=pinBuf.slice(0,-1);updateDots();return;}
  if(pinBuf.length>=4) return;
  pinBuf+=k;updateDots();
  if(pinBuf.length===4) setTimeout(submitPin,100);
}

function submitPin(){
  const{mode,id,cb}=pendingPin||{};
  if(mode==="set"){
    if(!db[id]) db[id]={};
    db[id]["__pin__"]=pinBuf;dbSave(id);unlock(id);closeModal("mo-pin");if(cb)cb();
  } else {
    if(pinBuf===db[id]?.["__pin__"]){unlock(id);closeModal("mo-pin");if(cb)cb();}
    else{document.getElementById("pin-err").textContent="Incorrect PIN";pinBuf="";updateDots();}
  }
}

function closePinModal(){pendingPin=null;pinBuf="";closeModal("mo-pin");}
function requirePin(id,action){
  if(!hasPin(id)){action();return;}
  if(pinUnlocked(id)){action();return;}
  openPin("verify",id,action);
}

function tryDelAthlete(id){
  if(athletes.length<=1){alert("Cannot delete last athlete.");return;}
  athleteToDelete=id;
  const a=athletes.find(x=>x.id===id);
  document.getElementById("del-text").textContent=`Delete all data for ${a.name}? Cannot be undone.`;
  const area=document.getElementById("del-pin-area");
  if(hasPin(id)&&!pinUnlocked(id)){
    area.innerHTML=`<label style="font-size:9px;letter-spacing:2px;color:var(--mu)">ENTER PIN</label>
      <input type="password" maxlength="4" inputmode="numeric" id="del-pin-inp"
        placeholder="••••" style="width:80px;letter-spacing:5px;font-size:16px;margin-top:3px">
      <div style="font-size:11px;color:var(--red);margin-top:2px" id="del-perr"></div>`;
    document.getElementById("del-btn").onclick=()=>{
      if(document.getElementById("del-pin-inp").value!==db[athleteToDelete]?.["__pin__"]){
        document.getElementById("del-perr").textContent="Incorrect PIN";return;
      }
      doDeleteAthlete();
    };
  } else {
    area.innerHTML="";
    document.getElementById("del-btn").onclick=doDeleteAthlete;
  }
  openModal("mo-del-athlete");
}

async function doDeleteAthlete(){
  if(!athleteToDelete) return;
  try{
    await sbReq("workouts","DELETE",null,`athlete=eq.${encodeURIComponent(athleteToDelete)}`);
    await sbReq("bodyweight","DELETE",null,`athlete=eq.${encodeURIComponent(athleteToDelete)}`);
    await sbReq("programs","DELETE",null,`athlete=eq.${encodeURIComponent(athleteToDelete)}`);
  }catch{}
  athletes=athletes.filter(a=>a.id!==athleteToDelete);
  delete db[athleteToDelete];delete bwRows[athleteToDelete];delete programs[athleteToDelete];
  athleteToDelete=null;await metaSave();closeModal("mo-del-athlete");switchAthlete(athletes[0].id);
}

function confetti(){
  const cols=["#e8ff00","#00e5ff","#ff4d00","#b47cff","#00ff9d","#ff9d00"];
  for(let i=0;i<70;i++){
    const el=document.createElement("div");
    el.className="cf";
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s;
      transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

function checkPR(e1rmVal,exName){
  const best=parseFloat(get("best-e1rm")||0);
  if(e1rmVal>best+0.05){
    set("best-e1rm",e1rmVal.toFixed(1));
    if(exName) set("best-e1rm-ex",exName);
    confetti();return true;
  }
  return false;
}

function startTimer(secs){
  clearInterval(rtInterval);rtSecs=secs;
  const el=document.getElementById("rt-disp");if(!el)return;
  el.className="rt-disp";el.textContent=secs+"s";
  rtInterval=setInterval(()=>{
    rtSecs--;
    const el2=document.getElementById("rt-disp");if(!el2) return;
    if(rtSecs<=0){
      clearInterval(rtInterval);el2.textContent="GO!";el2.className="rt-disp done";
      if("vibrate" in navigator) navigator.vibrate([200,100,200,100,200]);
    } else {
      el2.textContent=rtSecs+"s";el2.className="rt-disp"+(rtSecs<=10?" urgent":"");
    }
  },1000);
}
function stopTimer(){clearInterval(rtInterval);const el=document.getElementById("rt-disp");if(el){el.textContent="—";el.className="rt-disp";}}

function updateStreak(){
  let streak=0;const today=new Date();
  for(let i=0;i<90;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    if(get("trained-"+d.toISOString().slice(0,10))==="1") streak++;
    else if(i>0) break;
  }
  document.getElementById("streak-badge").textContent="🔥 "+streak;
}

// ══════════════════════════════════════════════════════
//  VOLUME CALC
// ══════════════════════════════════════════════════════
function calcSetVol(progId,weekIdx,day,exIdx){
  let total=0;
  const setsKey=`p${progId}-w${weekIdx}-${day}-ex${exIdx}-sets`;
  const sets=parseInt(get(setsKey))||0;
  for(let s=0;s<sets;s++){
    const w=parseFloat(get(`p${progId}-w${weekIdx}-${day}-ex${exIdx}-s${s}-wt`));
    const r=parseFloat(get(`p${progId}-w${weekIdx}-${day}-ex${exIdx}-s${s}-reps`));
    if(w&&r) total+=w*r;
  }
  return total;
}

function calcDayVol(progId,weekIdx,day,exList){
  let t=0;
  exList.forEach((_,i)=>t+=calcSetVol(progId,weekIdx,day,i));
  return t;
}

// ══════════════════════════════════════════════════════
//  E1RM
// ══════════════════════════════════════════════════════
function e1rm(w,r){
  if(!w||!r) return null;
  return parseFloat(w)*(1+parseFloat(r)/30);
}

function bestE1rmForEx(progId,weekIdx,day,exIdx,totalSets){
  let best=0;
  for(let s=0;s<totalSets;s++){
    const w=parseFloat(get(`p${progId}-w${weekIdx}-${day}-ex${exIdx}-s${s}-wt`));
    const r=parseFloat(get(`p${progId}-w${weekIdx}-${day}-ex${exIdx}-s${s}-reps`));
    const v=e1rm(w,r);if(v&&v>best) best=v;
  }
  return best||null;
}

// Best e1rm across ALL weeks for an exercise in a program
function allTimeBestE1rm(progId,exIdx,totalWeeks,day,totalSets){
  let best=0;
  for(let wi=0;wi<totalWeeks;wi++){
    const b=bestE1rmForEx(progId,wi,day,exIdx,totalSets);
    if(b&&b>best) best=b;
  }
  return best||null;
}

  sn.style.display="flex";

function updateDash(){
  const a=ca();if(!a) return;
  const tpr=parseFloat(get("target-pr"))||Math.round(a.pr*1.2);
  const bestE=parseFloat(get("best-e1rm")||0);
  const bestEx=get("best-e1rm-ex")||"";
  const progs=programs[currentId]||[];
  const primary=progs.find(p=>p.is_primary&&!p.is_archived);
  const privacy=isPrivacyOn();

  // Sessions count from primary program
  let sessions=0,totalWks=0;
  if(primary){
    totalWks=primary.weeks||4;
    for(let wi=0;wi<totalWks;wi++){
      WEEK_DAYS.forEach(day=>{
    if(get(`p${primary.id}-w${wi}-${day}-done`)==="1") sessions++;
      });
    }
  }

  const progPct=totalWks>0?Math.round((sessions/(totalWks*6))*100):0;
  const curPR=parseFloat(get("pr-bench-0"))||a.pr;
  const bPct=Math.min(100,Math.max(0,tpr>a.pr?Math.round(((curPR-a.pr)/(tpr-a.pr))*100):0));
  const pinSet=hasPin(currentId);

  // Sensitive stat cards — hidden entirely in privacy mode
  const sensitiveCards=privacy?"":`
    <div class="sc"><div class="l">Bench PR</div><div class="v">${a.pr}kg</div><div class="s">Starting</div></div>
    <div class="sc"><div class="l">Target PR</div><div class="v">${tpr}kg</div><div class="s">Editable above</div></div>`;

function openAddProgram(){
  document.getElementById("prog-name").value="";
  document.getElementById("prog-notes").value="";
  document.getElementById("prog-weeks").value="6";
  selectedTemplate="Smolov Jr.";
  buildTemplateGrid();
  openModal("mo-add-program");
}

function buildTemplateGrid(){
  document.getElementById("prog-tmpl-grid").innerHTML=
    Object.entries(PROG_TEMPLATES).map(([name,t])=>`
      <div class="prog-tmpl${selectedTemplate===name?" selected":""}" onclick="selectTemplate('${name}')">
        <h4>${name}</h4><p>${t.desc}</p>
        <p style="color:var(--ac);font-size:9px;margin-top:3px">${t.weeks}wk default</p>
      </div>`).join("");
}

function selectTemplate(name){
  selectedTemplate=name;
  document.getElementById("prog-weeks").value=PROG_TEMPLATES[name]?.weeks||4;
  buildTemplateGrid();
}

async function confirmAddProgram(){
  const name=document.getElementById("prog-name").value.trim()||selectedTemplate;
  const notes=document.getElementById("prog-notes").value.trim();
  const weeks=parseInt(document.getElementById("prog-weeks").value)||4;
  const tmpl=PROG_TEMPLATES[selectedTemplate];
  const id=currentId+"-prog-"+Date.now();
  const isFirst=!(programs[currentId]||[]).filter(p=>!p.is_archived).length;

  const prog={
    id,athlete:currentId,name,notes,template:selectedTemplate,
    weeks,is_primary:isFirst,is_archived:false,
    data:{days:JSON.parse(JSON.stringify(tmpl?.days||{}))},
    created_at:new Date().toISOString()
  };

  if(!programs[currentId]) programs[currentId]=[];
  if(isFirst) programs[currentId].forEach(p=>p.is_primary=false);
  programs[currentId].push(prog);
  await progSave(prog);
  closeModal("mo-add-program");

  // Navigate to Programs tab, select new program
  currentSub.prog=id;
  currentSub["prog-week"]="w0";
  // Mark Programs tab active in main nav
  document.querySelectorAll(".mtab").forEach(t=>{
    t.classList.toggle("active",t.dataset.page==="prog");
  });
  currentMain="prog";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-prog").classList.add("active");
  hideWeekNav();
  buildProgSubNav();
  buildProgPage(id);
}

function buildProgPage(progId){
  currentSub.prog=progId;
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);
  if(!prog){
    document.getElementById("page-prog").innerHTML=`<div class="hero"><h1>Program not found</h1></div>`;
    return;
  }

  // Ensure program name subtab shows correct active state
  buildProgSubNav();

  // Build week sub-nav in a SECOND row below program names
  let weekNav=document.getElementById("prog-week-nav");
  if(!weekNav){
    weekNav=document.createElement("div");
    weekNav.id="prog-week-nav";
    weekNav.className="sub-nav";
    weekNav.style.cssText="background:var(--bg);border-bottom:1px solid var(--bd);";
    // Insert after sub-nav
    const subNav=document.getElementById("sub-nav");
    subNav.parentNode.insertBefore(weekNav,subNav.nextSibling);
  }
  weekNav.style.display="flex";

  const weekItems=[];
  for(let wi=0;wi<prog.weeks;wi++) weekItems.push({id:`w${wi}`,label:`Week ${wi+1}`});
  weekItems.push({id:"settings",label:"⚙"});

  if(!currentSub["prog-week"]) currentSub["prog-week"]="w0";
  weekNav.innerHTML=weekItems.map(item=>`
    <div class="stab${currentSub["prog-week"]===item.id?" active":""}"
      onclick="selectWeekTab('${progId}','${item.id}',event)">${item.label}</div>
  `).join("");

  buildProgWeek(progId,currentSub["prog-week"]);
}

function selectWeekTab(progId,weekId,e){
  currentSub["prog-week"]=weekId;
  const nav=document.getElementById("prog-week-nav");
  if(nav) nav.querySelectorAll(".stab").forEach(t=>t.classList.toggle("active",t.textContent.trim()===
    (weekId==="settings"?"⚙":`Week ${parseInt(weekId.replace("w",""))+1}`)));
  buildProgWeek(progId,weekId);
}

function hideWeekNav(){
  const nav=document.getElementById("prog-week-nav");
  if(nav) nav.style.display="none";
}

function buildProgWeek(progId,subId){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);
  if(!prog) return;

  const container=document.getElementById("page-prog");

  if(subId==="settings"){
    buildProgSettings(progId,container,prog);
    return;
  }

  const wi=parseInt(subId.replace("w",""));
  let html=`<div class="hero" style="padding-top:12px">
    <h1 style="font-size:clamp(26px,5vw,44px)">${prog.name.toUpperCase()}<br><span>Week ${wi+1}</span></h1>
    <p class="hero-sub">Log every set · auto-saves</p>
  </div>`;

  const days=prog.data?.days||{};

  WEEK_DAYS.forEach(day=>{
    const dayData=days[day];
    if(!dayData) return;
    const isRest=!dayData.exercises||dayData.exercises.length===0;
    const dayVol=isRest?0:calcDayVol(progId,wi,day,dayData.exercises);
    // prevWi defined at day level so it's accessible everywhere in this day's block
    const prevWi=wi>0?wi-1:null;

    html+=`<div class="day-card">
      <div class="day-hdr" onclick="toggleDay('${progId}-w${wi}-${day}')">
        <h3 style="color:${isRest?'var(--mu)':'var(--tx)'}">${dayData.name||day}</h3>
        <div style="display:flex;align-items:center;gap:6px">
          ${dayVol>0?`<span style="font-size:10px;color:var(--mu)">${dayVol.toLocaleString()}kg</span>`:""}
          <span class="badge" style="background:${isRest?"rgba(255,255,255,.03)":"rgba(232,255,0,.08)"};
            color:${isRest?"var(--mu)":"var(--ac)"};border:1px solid ${isRest?"var(--bd)":"rgba(232,255,0,.2)"}">
            ${isRest?"REST":"TRAIN"}</span>
        </div>
      </div>
      <div class="day-body" id="body-${progId}-w${wi}-${day}">`;

    if(isRest){
      html+=`<p style="font-size:12px;color:var(--mu);padding:6px 0">Rest day — eat, sleep, recover.</p>`;
    } else {
      dayData.exercises.forEach((ex,exIdx)=>{
        const storedSets=parseInt(get(`p${progId}-w${wi}-${day}-ex${exIdx}-sets`))||ex.sets||3;
        const mc=(()=>{const m=MUSCLE_MAP[ex.name];return m?({chest:"var(--red)",back:"var(--cy)",biceps:"var(--ac)",
          triceps:"var(--ac)",shoulders:"var(--pu)","rear delt":"var(--pu)",quads:"var(--gn)",
          hamstrings:"var(--gn)",glutes:"var(--pk)",calves:"var(--gn)",core:"var(--or)"}[m]||"var(--tx)"):"var(--tx)";})();
        const allBest=allTimeBestE1rm(progId,exIdx,prog.weeks,day,storedSets+5);

        html+=`<div class="ex-block">
          <div class="ex-block-hdr">
            <span class="ex-block-name" style="color:${mc}">${ex.name}</span>
            <div style="display:flex;align-items:center;gap:5px">
              ${ex.note?`<span style="font-size:9px;color:var(--mu)">${ex.note}</span>`:""}
              <span class="ex-block-del" onclick="removeExercise('${progId}',${wi},'${day}',${exIdx})" title="Remove exercise">×</span>
            </div>
          </div>
          <table class="set-table">
            <thead><tr>
              <th>#</th><th>Target</th><th>Weight</th><th>Reps</th><th>RPE</th><th>e1RM</th>
              ${prevWi!==null?`<th style="color:var(--mu);font-size:7px">PREV</th>`:""}
              <th></th>
            </tr></thead>
            <tbody id="sets-${progId}-w${wi}-${day}-ex${exIdx}">`;

        for(let s=0;s<storedSets;s++){
          html+=buildSetRow(progId,wi,day,exIdx,s,ex,prevWi,allBest);
        }

        html+=`</tbody></table>
          <button class="add-set-btn" onclick="addSet('${progId}',${wi},'${day}',${exIdx})">
            + Add Set
          </button>
        </div>`;
      });

      html+=`<button class="add-ex-btn" onclick="openExSearch('Add Exercise to ${day}',name=>addExercise('${progId}',${wi},'${day}',name))">
        + Add Exercise
      </button>`;

      html+=`<div class="rest-timer">
        <span style="font-size:9px;letter-spacing:2px;color:var(--mu);text-transform:uppercase">Rest</span>
        <button class="rt-btn" onclick="startTimer(90)">90s</button>
        <button class="rt-btn" onclick="startTimer(120)">2m</button>
        <button class="rt-btn" onclick="startTimer(180)">3m</button>
        <button class="rt-btn" onclick="stopTimer()">■</button>
        <div class="rt-disp" id="rt-disp">—</div>
      </div>`;

      const noteKey=`p${progId}-w${wi}-${day}-notes`;
      html+=`<div class="sn-wrap">
        <label>Session Notes</label>
        <textarea placeholder="shoulder tight, slept 5hrs, felt strong…"
          onchange="set('${noteKey}',this.value)">${get(noteKey)}</textarea>
      </div>`;

      const prevVol=prevWi!==null?calcDayVol(progId,prevWi,day,days[day].exercises):0;
      const volDiff=prevVol>0?Math.round(((dayVol-prevVol)/prevVol)*100):null;
      html+=`<div class="vol-box">
        <div>
          <div class="vol-label">Session Volume</div>
          <div class="vol-val" id="vol-${progId}-w${wi}-${day}">${dayVol>0?dayVol.toLocaleString()+"kg":"—"}</div>
          ${volDiff!==null?`<div class="vol-cmp" style="color:${volDiff>=0?"var(--gn)":"var(--red)"}">
            ${volDiff>=0?"+":""}${volDiff}% vs last week</div>`:""}
        </div>
        <button class="rt-btn" onclick="shareSession('${progId}',${wi},'${day}')">📤 Share</button>
      </div>`;
    }

    html+=`<button class="save-btn" onclick="saveDay('${progId}',${wi},'${day}')">Save Session</button>
      <span class="save-msg" id="msg-${progId}-${wi}-${day}">✓ Saved</span>
      </div></div>`;
  });

  container.innerHTML=html;
}

function buildSetRow(progId,wi,day,exIdx,s,ex,prevWi,allBest){
  // prevWi may be undefined when called from refreshExBlock — default to null
  const _prevWi = (prevWi === undefined) ? null : prevWi;
  const wKey=`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-wt`;
  const rKey=`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-reps`;
  const pKey=`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-rpe`;
  const wVal=get(wKey);const rVal=get(rKey);
  const ev=e1rm(wVal,rVal);
  const isBest=ev&&allBest&&ev>=allBest-0.05;

  const prevW=_prevWi!==null?get(`p${progId}-w${_prevWi}-${day}-ex${exIdx}-s${s}-wt`):"";
  const prevR=_prevWi!==null?get(`p${progId}-w${_prevWi}-${day}-ex${exIdx}-s${s}-reps`):"";

  return `<tr id="setrow-${progId}-w${wi}-${day}-ex${exIdx}-s${s}"${isBest?" class='best-set'":""}>
    <td class="set-num">${s+1}</td>
    <td style="font-size:10px;color:var(--mu)">${ex.reps||"—"}</td>
    <td>
      <input type="number" step="0.5" placeholder="${prevW||'kg'}" value="${wVal}"
        onchange="setAndRefresh('${wKey}',this.value,'${progId}','${wi}','${day}','${exIdx}','${s}')">
      ${prevW?`<div class="ghost-val">${prevW}kg</div>`:""}
    </td>
    <td>
      <input type="number" placeholder="${prevR||'reps'}" value="${rVal}"
        onchange="setAndRefresh('${rKey}',this.value,'${progId}','${wi}','${day}','${exIdx}','${s}')">
      ${prevR?`<div class="ghost-val">${prevR}r</div>`:""}
    </td>
    <td><input type="number" step="0.5" min="1" max="10" placeholder="RPE" value="${get(pKey)}"
      onchange="set('${pKey}',this.value)"></td>
    <td class="e1rm-cell">${ev?ev.toFixed(1)+"kg":"—"}</td>
    ${_prevWi!==null?`<td style="font-size:10px;color:var(--mu)">${prevW&&prevR?prevW+"×"+prevR:""}</td>`:""}
    <td><button class="del-set" onclick="delSet('${progId}',${wi},'${day}',${exIdx},${s})">×</button></td>
  </tr>`;
}

function setAndRefresh(key,val,progId,wi,day,exIdx,s){
  set(key,val);
  refreshExBlock(progId,parseInt(wi),day,parseInt(exIdx));
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);
  const exName=prog?.data?.days?.[day]?.exercises?.[parseInt(exIdx)]?.name||"";
  const w=parseFloat(get(`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-wt`));
  const r=parseFloat(get(`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-reps`));
  const v=e1rm(w,r);if(v) checkPR(v,exName);
  refreshVolDisplay(progId,wi,day);
}

function refreshExBlock(progId,wi,day,exIdx){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const ex=prog.data?.days?.[day]?.exercises?.[exIdx];if(!ex) return;
  const tbody=document.getElementById(`sets-${progId}-w${wi}-${day}-ex${exIdx}`);if(!tbody) return;
  const storedSets=parseInt(get(`p${progId}-w${wi}-${day}-ex${exIdx}-sets`))||ex.sets||3;
  const allBest=allTimeBestE1rm(progId,exIdx,prog.weeks,day,storedSets+5);
  const prevWi=wi>0?wi-1:null;
  tbody.innerHTML="";
  for(let s=0;s<storedSets;s++){
    tbody.innerHTML+=buildSetRow(progId,wi,day,exIdx,s,ex,prevWi,allBest);
  }
}

function refreshVolDisplay(progId,wi,day){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const exList=prog.data?.days?.[day]?.exercises||[];
  const v=calcDayVol(progId,wi,day,exList);
  const el=document.getElementById(`vol-${progId}-w${wi}-${day}`);
  if(el) el.textContent=v>0?v.toLocaleString()+"kg":"—";
}

function addSet(progId,wi,day,exIdx){
  const k=`p${progId}-w${wi}-${day}-ex${exIdx}-sets`;
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const ex=prog.data?.days?.[day]?.exercises?.[exIdx];if(!ex) return;
  const cur=parseInt(get(k))||ex.sets||3;
  set(k,cur+1);
  refreshExBlock(progId,wi,day,exIdx);
}

function delSet(progId,wi,day,exIdx,sIdx){
  const k=`p${progId}-w${wi}-${day}-ex${exIdx}-sets`;
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const ex=prog.data?.days?.[day]?.exercises?.[exIdx];if(!ex) return;
  const cur=parseInt(get(k))||ex.sets||3;
  if(cur<=1) return;
  // Shift subsequent set data up
  for(let s=sIdx;s<cur-1;s++){
    ["wt","reps","rpe"].forEach(f=>{
      set(`p${progId}-w${wi}-${day}-ex${exIdx}-s${s}-${f}`,
        get(`p${progId}-w${wi}-${day}-ex${exIdx}-s${s+1}-${f}`));
    });
  }
  set(k,cur-1);
  refreshExBlock(progId,wi,day,exIdx);
}

function addExercise(progId,wi,day,name){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  if(!prog.data.days[day]) prog.data.days[day]={name:day,exercises:[]};
  prog.data.days[day].exercises.push({name,sets:3,reps:"10"});
  progSave(prog);
  buildProgWeek(progId,`w${wi}`);
}

function removeExercise(progId,wi,day,exIdx){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  prog.data.days[day].exercises.splice(exIdx,1);
  progSave(prog);
  buildProgWeek(progId,`w${wi}`);
}

function toggleDay(id){document.getElementById(`body-${id}`)?.classList.toggle("open");}

function saveDay(progId,wi,day){
  set(`p${progId}-w${wi}-${day}-done`,"1");
  set(`trained-${new Date().toISOString().slice(0,10)}`,"1");
  const msg=document.getElementById(`msg-${progId}-${wi}-${day}`);
  if(msg){msg.classList.add("show");setTimeout(()=>msg.classList.remove("show"),2500);}
  updateStreak();updateDash();
}

function shareSession(progId,wi,day){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const a=ca();
  const exList=prog.data?.days?.[day]?.exercises||[];
  let txt=`🏋️ ${a.name} — ${day} (${prog.name} Week ${wi+1})\n📅 ${new Date().toLocaleDateString()}\n`;
  exList.forEach((ex,i)=>{
    const sets=parseInt(get(`p${progId}-w${wi}-${day}-ex${i}-sets`))||ex.sets||3;
    txt+=`\n${ex.name}\n`;
    for(let s=0;s<sets;s++){
      const w=get(`p${progId}-w${wi}-${day}-ex${i}-s${s}-wt`);
      const r=get(`p${progId}-w${wi}-${day}-ex${i}-s${s}-reps`);
      const rpe=get(`p${progId}-w${wi}-${day}-ex${i}-s${s}-rpe`);
      if(w||r) txt+=`  Set ${s+1}: ${w||"—"}kg × ${r||"—"}${rpe?` @ RPE${rpe}`:""}\n`;
    }
  });
  const notes=get(`p${progId}-w${wi}-${day}-notes`);
  if(notes) txt+=`\n📝 ${notes}\n`;
  const vol=calcDayVol(progId,wi,day,exList);
  if(vol>0) txt+=`\n📦 Volume: ${vol.toLocaleString()}kg\n`;
  document.getElementById("share-content").textContent=txt;
  openModal("mo-share");
}

function copyShare(){
  navigator.clipboard?.writeText(document.getElementById("share-content").textContent)
    .then(()=>{alert("Copied to clipboard!");});
}

        onclick="archiveProg('${progId}')">Archive</button>
      <button class="save-btn" style="margin-top:0;background:var(--red)"
        onclick="requirePin('${currentId}',()=>deleteProg('${progId}'))">Delete</button>
    </div>
  </div>

  <div style="background:var(--sf);border-radius:5px;padding:14px;margin-top:10px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--ac);margin-bottom:8px">Day Structure</div>
    <p style="font-size:11px;color:var(--mu);margin-bottom:10px">Drag exercises to reorder. Click day name to rename.</p>
    <div id="dnd-days"></div>
  </div>`;

  buildDndDays(progId,prog);
}

function buildDndDays(progId,prog){
  const wrap=document.getElementById("dnd-days");if(!wrap) return;
  const days=prog.data?.days||{};
  wrap.innerHTML=WEEK_DAYS.map(day=>{
    const d=days[day]||{name:day,exercises:[]};
    return `<div class="dnd-day" id="dnd-${day}">
      <div class="dnd-day-hdr">
        <input type="text" value="${d.name||day}" style="background:transparent;border:none;
          font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--tx);width:120px;text-align:left"
          onchange="renameDayInProg('${progId}','${day}',this.value)">
        <button class="add-ex-btn" style="margin-top:0;padding:4px 8px;font-size:9px"
          onclick="openExSearch('Add to ${day}',name=>addExToDay('${progId}','${day}',name))">+ Ex</button>
      </div>
      <div class="dnd-ex-list" id="dnd-exlist-${day}">
        ${(d.exercises||[]).map((ex,i)=>`
          <div class="dnd-ex" draggable="true"
            ondragstart="dragStart('${day}',${i})"
            ondragover="dragOver(event,'${day}',${i})"
            ondrop="dropEx(event,'${progId}','${day}')">
            <span class="drag-handle">⠿</span>
            <span style="flex:1;font-size:12px">${ex.name}</span>
            <span style="font-size:10px;color:var(--mu)">${ex.sets}×${ex.reps}</span>
            <span class="ex-del" onclick="removeExFromDay('${progId}','${day}',${i})">×</span>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function dragStart(day,idx){dragSrc={day,idx};}
function dragOver(e,day,idx){e.preventDefault();dragDest={day,idx};}
function dropEx(e,progId,day){
  e.preventDefault();
  if(!dragSrc||dragSrc.day!==day) return;
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  const exs=prog.data.days[day].exercises;
  const destIdx=dragDest?.day===day?dragDest.idx:exs.length-1;
  const [moved]=exs.splice(dragSrc.idx,1);
  // Insert at destination, adjusting for the removed element
  const insertAt=destIdx>dragSrc.idx?destIdx-1:destIdx;
  exs.splice(Math.max(0,insertAt),0,moved);
  progSave(prog);buildDndDays(progId,prog);dragSrc=null;dragDest=null;
}

function addExToDay(progId,day,name){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  if(!prog.data.days[day]) prog.data.days[day]={name:day,exercises:[]};
  prog.data.days[day].exercises.push({name,sets:3,reps:"10"});
  progSave(prog);buildDndDays(progId,prog);
}

function removeExFromDay(progId,day,idx){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  prog.data.days[day].exercises.splice(idx,1);
  progSave(prog);buildDndDays(progId,prog);
}

function renameDayInProg(progId,day,name){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  if(!prog.data.days[day]) prog.data.days[day]={exercises:[]};
  prog.data.days[day].name=name;progSave(prog);
}

function saveProgSettings(progId){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  prog.name=document.getElementById("ps-name").value.trim()||prog.name;
  prog.notes=document.getElementById("ps-notes").value;
  progSave(prog);
  buildProgNav();
  if(currentMain==="prog") buildProgSubNav();
  alert("Saved!");
}

function setPrimary(progId,val){
  const progs=programs[currentId]||[];
  progs.forEach(p=>{p.is_primary=(p.id===progId&&val);progSave(p);});
  buildProgNav();
  if(currentMain==="prog") buildProgSubNav();
  updateDash();
}

function archiveProg(progId){
  const prog=(programs[currentId]||[]).find(p=>p.id===progId);if(!prog) return;
  prog.is_archived=true;if(prog.is_primary) prog.is_primary=false;
  progSave(prog);buildProgNav();showMain("dash");
}

function deleteProg(progId){
  if(!confirm("Delete this program permanently?")) return;
  programs[currentId]=(programs[currentId]||[]).filter(p=>p.id!==progId);
  sbReq("programs","DELETE",null,`id=eq.${encodeURIComponent(progId)}`).catch(()=>{});
  buildProgNav();showMain("dash");
}

function buildBW(){
  const a=ca();
  const rows=bwRows[currentId]||[];
  const showBMI=get("show-bmi")!=="0";
  const targetBW=parseFloat(get("target-bw"))||0;
  const heightM=parseFloat(get("height-m"))||1.83;
  const showAvg=get("bw-avg")==="1";
  const privacy=isPrivacyOn();
  const mask=v=>privacy?"●●●":v;

  // Compute week averages
  let labels=[],vals=[];
  if(showAvg){
    const grouped={};
    rows.forEach(r=>{
      const d=new Date(r.date);
      const wk=`${d.getFullYear()}-W${Math.ceil((d-new Date(d.getFullYear(),0,1))/604800000)}`;
      if(!grouped[wk]) grouped[wk]=[];
      grouped[wk].push(r.weight_kg);
    });
    Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).forEach(([wk,ws])=>{
      labels.push(wk);vals.push(parseFloat((ws.reduce((a,b)=>a+b,0)/ws.length).toFixed(1)));
    });
  } else {
    labels=rows.map(r=>r.date);vals=rows.map(r=>r.weight_kg);
  }

  const latestBW=rows.length?rows[rows.length-1].weight_kg:null;
  const latestBMI=latestBW?(latestBW/(heightM*heightM)).toFixed(1):null;

  document.getElementById("page-bw").innerHTML=`
  <div class="hero" style="padding-top:12px">
    <h1 style="font-size:clamp(28px,5vw,50px)">BODY<br><span>WEIGHT</span></h1>
    <p class="hero-sub">${a.name} · daily tracking${privacy?' · <span style="color:var(--or);font-size:10px">🙈 values hidden</span>':""}</p>
  </div>

  ${latestBW?`<div class="stats">
    <div class="sc"><div class="l">Latest</div><div class="v">${mask(latestBW+"kg")}</div></div>
    ${showBMI&&latestBMI?`<div class="sc"><div class="l">BMI</div><div class="v">${mask(latestBMI)}</div>
      <div class="s">${privacy?"—":parseFloat(latestBMI)<18.5?"Underweight":parseFloat(latestBMI)<25?"Normal":parseFloat(latestBMI)<30?"Overweight":"Obese"}</div></div>`:""}
    ${targetBW?`<div class="sc"><div class="l">To Target</div>
      <div class="v">${mask((targetBW-latestBW).toFixed(1)+"kg")}</div>
      <div class="s">${privacy?"—":targetBW+"kg target"}</div></div>`:""}
  </div>`:""}

  <div style="background:var(--sf);border-radius:5px;padding:12px;margin-top:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
      <div>
        <label style="font-size:8px;letter-spacing:2px;color:var(--mu);display:block;margin-bottom:3px">DATE</label>
        <input type="date" id="bw-date" value="${new Date().toISOString().slice(0,10)}" style="width:140px">
      </div>
      <div>
        <label style="font-size:8px;letter-spacing:2px;color:var(--mu);display:block;margin-bottom:3px">WEIGHT (kg)</label>
        <input type="number" step="0.1" id="bw-weight" placeholder="78.5" style="width:80px">
      </div>
      <button class="save-btn" style="margin-top:0" onclick="logBW()">Log</button>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
      <div>
        <label style="font-size:8px;letter-spacing:2px;color:var(--mu);display:block;margin-bottom:3px">HEIGHT (m)</label>
        <input type="number" step="0.01" value="${heightM}" style="width:70px"
          onchange="set('height-m',this.value);buildBW()">
      </div>
      <div>
        <label style="font-size:8px;letter-spacing:2px;color:var(--mu);display:block;margin-bottom:3px">TARGET (kg)</label>
        <input type="number" step="0.5" value="${targetBW||''}" placeholder="—" style="width:70px"
          onchange="set('target-bw',this.value)">
      </div>
      <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" ${showBMI?"checked":""} onchange="set('show-bmi',this.checked?'1':'0');buildBW()">
        Show BMI

      <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" ${showAvg?"checked":""} onchange="set('bw-avg',this.checked?'1':'0');buildBW()">
        Week averages

    </div>

    ${rows.length>0?`
    ${privacy?
      `<div style="text-align:center;padding:20px;color:var(--mu);font-size:12px">🙈 Chart hidden in privacy mode</div>`:
      `<div class="chart-wrap" style="padding:0;background:transparent;margin-bottom:10px">
        <canvas id="chart-bw" style="max-height:180px"></canvas>
      </div>`}
    <div style="max-height:200px;overflow-y:auto">
      ${[...rows].reverse().map(row=>{
        const bmi=showBMI?(row.weight_kg/(heightM*heightM)).toFixed(1):"";

      charts.bw=new Chart(document.getElementById("chart-bw"),{
        type:"line",data:{labels,datasets},
        options:{responsive:true,plugins:{legend:{display:targetBW>0,labels:{color:tc,font:{size:10}}}},
          scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
            x:{grid:{color:gc},ticks:{color:tc,font:{size:9},maxTicksLimit:8}}}}
      });
    },80);
  }
}

async function logBW(){
  const date=document.getElementById("bw-date").value;
  const weight=parseFloat(document.getElementById("bw-weight").value);
  if(!date||!weight) return;
  await bwSave(currentId,date,weight);
  await bwFetch(currentId);buildBW();
}

async function delBW(date){
  await bwDelete(currentId,date);
  await bwFetch(currentId);buildBW();
}

// ══════════════════════════════════════════════════════
function buildAnalytics(){
  const a=ca();
  const progs=programs[currentId]||[];
  const primary=progs.find(p=>p.is_primary&&!p.is_archived)||progs[0];

  // Gather volume and e1rm per session
  const volLabels=[],volData=[],e1rmLabels=[],e1rmData=[];
  const muscleVol={};

  if(primary){
    for(let wi=0;wi<primary.weeks;wi++){
      WEEK_DAYS.forEach(day=>{
        const d=primary.data?.days?.[day];if(!d||!d.exercises?.length) return;
        const v=calcDayVol(primary.id,wi,day,d.exercises);
        if(v>0){volLabels.push(`W${wi+1} ${day.slice(0,3)}`);volData.push(v);}

        d.exercises.forEach((ex,ei)=>{
          const sets=parseInt(get(`p${primary.id}-w${wi}-${day}-ex${ei}-sets`))||ex.sets||3;
          let exBest=0;
          for(let s=0;s<sets;s++){
            const w=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-wt`));
            const r=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-reps`));
            const v2=e1rm(w,r);if(v2&&v2>exBest){exBest=v2;}
            if(w&&r){
              const m=MUSCLE_MAP[ex.name];
              if(m) muscleVol[m]=(muscleVol[m]||0)+w*r;
            }
          }
          if(exBest>0&&ex.name==="Bench Press (Barbell)"){
            e1rmLabels.push(`W${wi+1} ${day.slice(0,3)}`);e1rmData.push(parseFloat(exBest.toFixed(1)));
          }
        });
      });
    }
  }

  const mvL=Object.keys(muscleVol).sort((a,b)=>muscleVol[b]-muscleVol[a]);
  const mvD=mvL.map(m=>Math.round(muscleVol[m]));
  const mvC=mvL.map(m=>({chest:"#ff4d00",back:"#00e5ff",biceps:"#e8ff00",triceps:"#e8ff00",
    shoulders:"#b47cff","rear delt":"#b47cff",quads:"#00ff9d",hamstrings:"#00ff9d",
    glutes:"#ff4d8b",calves:"#00ff9d",core:"#ff9d00"}[m]||"#666"));

  // Session comparison
  let cmpText="";
  if(volData.length>=2){
    const last=volData[volData.length-1],prev=volData[volData.length-2];
    const diff=Math.round(((last-prev)/prev)*100);
    cmpText=`Last session: ${diff>=0?"+":""}${diff}% vs previous (${last.toLocaleString()}kg vs ${prev.toLocaleString()}kg)`;
  }

  document.getElementById("page-analytics").innerHTML=`
  <div class="hero" style="padding-top:12px">
    <h1 style="font-size:clamp(26px,5vw,44px)">ANALYTICS</h1>
    <p class="hero-sub">${a.name} · ${primary?primary.name:"no primary program"}</p>
  </div>
  ${cmpText?`<div style="background:rgba(232,255,0,.06);border:1px solid rgba(232,255,0,.15);
    border-radius:4px;padding:9px 13px;font-size:12px;color:var(--ac);margin-bottom:10px">
    📊 ${cmpText}</div>`:""}
  <div class="sec">Volume Per Session</div>
  <div class="chart-wrap"><canvas id="ch-vol"></canvas></div>
  <div class="sec">Bench e1RM Over Time</div>
  <div class="chart-wrap"><canvas id="ch-e1rm"></canvas></div>
  <div class="sec">Volume by Muscle Group</div>
  <div class="chart-wrap"><canvas id="ch-muscle"></canvas></div>`;

  setTimeout(()=>{
    const ac=accent();const gc="rgba(255,255,255,0.05)";
    const tc=document.documentElement.getAttribute("data-theme")==="dark"?"#f0f0f0":"#111";
    if(charts.vol) charts.vol.destroy();
    charts.vol=new Chart(document.getElementById("ch-vol"),{
      type:"line",data:{labels:volLabels,datasets:[{label:"Volume (kg)",data:volData,
        borderColor:ac,backgroundColor:ac+"22",tension:.3,pointBackgroundColor:ac,pointRadius:4,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
          x:{grid:{color:gc},ticks:{color:tc,font:{size:9}}}}}
    });
    if(charts.e1rm) charts.e1rm.destroy();
    charts.e1rm=new Chart(document.getElementById("ch-e1rm"),{
      type:"line",data:{labels:e1rmLabels,datasets:[{label:"Bench e1RM",data:e1rmData,
        borderColor:ac,backgroundColor:ac+"22",tension:.3,pointBackgroundColor:ac,pointRadius:4,fill:true}]},
      options:{responsive:true,plugins:{legend:{display:false}},spanGaps:true,
        scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+"kg"}},
          x:{grid:{color:gc},ticks:{color:tc,font:{size:9}}}}}
    });
    if(charts.muscle) charts.muscle.destroy();
    charts.muscle=new Chart(document.getElementById("ch-muscle"),{
      type:"bar",data:{labels:mvL.map(m=>m.charAt(0).toUpperCase()+m.slice(1)),
        datasets:[{data:mvD,backgroundColor:mvC,borderRadius:3}]},
      options:{responsive:true,indexAxis:"y",plugins:{legend:{display:false}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
          y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}}}
    });
  },100);
}

// ── SVG SHAPE RENDERER ────────────────────────────────
function renderMuscleShape(id,shape,colour,opacity){
  const a=`id="${id}" fill="${colour}" opacity="${opacity}"`;
  if(shape.type==="ellipse") return `<ellipse ${a} cx="${shape.cx}" cy="${shape.cy}" rx="${shape.rx}" ry="${shape.ry}"/>`;
  if(shape.type==="rect")    return `<rect ${a} x="${shape.x}" y="${shape.y}" width="${shape.width}" height="${shape.height}" rx="${shape.rx||0}"/>`;
  if(shape.type==="path")    return `<path ${a} d="${shape.d}"/>`;
  return "";
}

function buildBody(){
  const primary=(programs[currentId]||[]).find(p=>p.is_primary&&!p.is_archived);
  const mv={};
  if(primary){
    for(let wi=0;wi<primary.weeks;wi++){
      WEEK_DAYS.forEach(day=>{
        const d=primary.data?.days?.[day];if(!d?.exercises?.length) return;
        d.exercises.forEach((ex,ei)=>{
          const sets=parseInt(get(`p${primary.id}-w${wi}-${day}-ex${ei}-sets`))||ex.sets||3;
          for(let s=0;s<sets;s++){
            const w=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-wt`));
            const r=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-reps`));
            if(w&&r){const m=MUSCLE_MAP[ex.name];if(m) mv[m]=(mv[m]||0)+w*r;}
          }
        });
      });
    }
  }

  const maxV=Math.max(...Object.values(mv),1);
  function muscleStyle(id){
    const group=MUSCLE_ID_MAP[id]||"core";
    const pct=(mv[group]||0)/maxV;
    if(pct<0.01) return {colour:"#1e1e1e",opacity:0.6};
    const r=Math.round(232*pct),g=Math.round(255*pct);
    return {colour:`rgb(${r},${g},0)`,opacity:0.25+0.75*pct};
  }

  const headNeck=`
    <ellipse cx="100" cy="30" rx="21" ry="26" fill="#1e1e1e" stroke="#444" stroke-width="1.2"/>
    <path d="M91 52 Q91 64 88 68 L112 68 Q109 64 109 52Z" fill="#1a1a1a" stroke="#444" stroke-width="1"/>`;
  const decor=`
    <ellipse cx="79" cy="326" rx="11" ry="9" fill="#222" stroke="#444" stroke-width="1"/>
    <ellipse cx="121" cy="326" rx="11" ry="9" fill="#222" stroke="#444" stroke-width="1"/>
    <ellipse cx="80" cy="414" rx="10" ry="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <ellipse cx="120" cy="414" rx="10" ry="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>`;

  const frontShapes=Object.entries(FRONT_MUSCLES).map(([id,shape])=>{
    const{colour,opacity}=muscleStyle(id);
    return renderMuscleShape(id,shape,colour,opacity);
  }).join("");

  const backShapes=Object.entries(BACK_MUSCLES).map(([id,shape])=>{
    const{colour,opacity}=muscleStyle(id);
    return renderMuscleShape(id,shape,colour,opacity);
  }).join("");

  document.getElementById("page-body").innerHTML=`
  <div class="hero" style="padding-top:12px">
    <h1 style="font-size:clamp(26px,5vw,44px)">BODY<br><span>HEATMAP</span></h1>
    <p class="hero-sub">Brighter = more volume · primary program · edit FRONT_MUSCLES / BACK_MUSCLES in code to reshape</p>
  </div>
  <div class="body-wrap">
    <div class="body-panel">
      <h4>FRONT</h4>
      <svg viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:380px">
        ${headNeck}
        <path d="${BODY_OUTLINE_PATH}" fill="#1a1a1a" stroke="#444" stroke-width="1.2"/>
        ${frontShapes}${decor}
      </svg>
    </div>
    <div class="body-panel">
      <h4>BACK</h4>
      <svg viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:380px">
        ${headNeck}
        <path d="${BODY_OUTLINE_PATH}" fill="#1a1a1a" stroke="#444" stroke-width="1.2"/>
        ${backShapes}${decor}
      </svg>
    </div>
  </div>
  <div style="background:var(--sf);border-radius:5px;padding:12px;margin-top:9px">
    <div style="font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:7px">Volume Legend</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:5px">
      ${Object.entries(mv).sort(([,a],[,b])=>b-a).map(([m,v])=>{
        const pct=(mv[m]||0)/maxV;
        const rc=Math.round(232*pct),gc=Math.round(255*pct);
        const col=pct<0.01?"#1e1e1e":`rgb(${rc},${gc},0)`;
        const op=pct<0.01?0.3:0.25+0.75*pct;
        return `<div style="display:flex;align-items:center;gap:5px;font-size:11px">
          <div style="width:9px;height:9px;border-radius:50%;background:${col};opacity:${op};flex-shrink:0"></div>

          <span style="color:var(--ac);margin-left:auto">${(v/1000).toFixed(1)}t</span>

      }).join("")}
    </div>
  </div>`;
}

function buildPR(){
  const subItems=[
    {id:"bench",label:"Bench"},{id:"squat",label:"Squat"},
    {id:"deadlift",label:"Deadlift"},{id:"other",label:"Other"}
  ];
  if(!currentSub.pr) currentSub.pr="bench";
  buildSubNav("pr",subItems);

  if(currentSub.pr==="other"){
    buildPROther();return;
  }

  const exMap={bench:"Bench Press (Barbell)",squat:"Squat (Barbell)",deadlift:"Deadlift (Barbell)"};
  const exName=exMap[currentSub.pr];
  const startDate=new Date("2026-03-16");
  const rows=[];
  for(let i=0;i<5;i++){
    const d=new Date(startDate);d.setDate(d.getDate()+i*7);
    rows.push({date:d.toISOString().slice(0,10),idx:i});
  }

  // Load from pr_history
  const histKey=`pr-hist-${currentSub.pr}`;
  const stored=get(histKey);
  let hist=[];
  try{hist=stored?JSON.parse(stored):[];}catch{}

  // Best e1rm from program logs for each week
  const primary=(programs[currentId]||[]).find(p=>p.is_primary&&!p.is_archived);
  function weekE1rm(wi){
    if(!primary) return null;
    let best=0;
    WEEK_DAYS.forEach(day=>{
      const d=primary.data?.days?.[day];if(!d?.exercises) return;
      d.exercises.forEach((ex,ei)=>{
        if(ex.name!==exName) return;
        const sets=parseInt(get(`p${primary.id}-w${wi}-${day}-ex${ei}-sets`))||ex.sets||3;
        for(let s=0;s<sets;s++){
          const w=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-wt`));
          const r=parseFloat(get(`p${primary.id}-w${wi}-${day}-ex${ei}-s${s}-reps`));
          const v=e1rm(w,r);if(v&&v>best)best=v;
        }
      });
    });
    return best||null;
  }

  const prLabels=[],prData=[];

  document.getElementById("page-pr").innerHTML=`
  <div class="hero" style="padding-top:12px">
    <h1 style="font-size:clamp(24px,4vw,40px)">PR<br><span>${currentSub.pr.toUpperCase()}</span></h1>
    <p class="hero-sub">${exName}</p>
  </div>
  <table class="pr-table">
    <thead><tr>
      <th style="text-align:left">Date</th>
      <th>1RM (kg)</th>
      <th>e1RM (auto)</th>
      <th>Change</th>
      <th></th>
    </tr></thead>
    <tbody id="pr-tbody">
      ${rows.map(({date,idx})=>{
        const stored1rm=get(`pr-${currentSub.pr}-${idx}`)||"";
        const storedDate=get(`pr-${currentSub.pr}-date-${idx}`)||date;
        const autoE=weekE1rm(idx);
        if(stored1rm) prLabels.push(storedDate),prData.push(parseFloat(stored1rm));
        return `<tr>
          <td><input type="date" value="${storedDate}"
            style="background:var(--bg);border:1px solid var(--bd);color:var(--mu);
            font-size:11px;padding:3px;border-radius:3px;width:120px"
            onchange="set('pr-${currentSub.pr}-date-${idx}',this.value)"></td>
          <td><input type="number" step="0.5" value="${stored1rm}" placeholder="kg"
            id="pr-${currentSub.pr}-${idx}"
            style="background:var(--bg);border:1px solid var(--ac);color:var(--ac);
            font-weight:700;font-size:13px;padding:4px;border-radius:3px;width:68px;text-align:center"
            onchange="set('pr-${currentSub.pr}-${idx}',this.value);buildPR()"></td>
          <td style="color:var(--cy);font-weight:600;font-size:12px">${autoE?autoE.toFixed(1)+"kg":"—"}</td>
          <td id="prd-${currentSub.pr}-${idx}" style="font-weight:700;font-size:12px">—</td>
          <td><button class="del-set" onclick="delPRRow('${currentSub.pr}',${idx},${rows.length})">×</button></td>
        </tr>`;
      }).join("")}
    </tbody>
  </table>
  <button class="add-ex-btn" style="margin-top:8px" onclick="addPRRow('${currentSub.pr}')">+ Add Week</button>
  ${prData.length>1?`
  <div class="sec">Trend</div>
  <div class="chart-wrap"><canvas id="ch-pr" style="max-height:160px"></canvas></div>`:""}`;

  // Fill diffs
  rows.forEach(({idx})=>{
    if(idx===0) return;
    const cur=parseFloat(get(`pr-${currentSub.pr}-${idx}`));
    const prv=parseFloat(get(`pr-${currentSub.pr}-${idx-1}`));
    const el=document.getElementById(`prd-${currentSub.pr}-${idx}`);
    if(!el) return;
    if(cur&&prv){const d=(cur-prv).toFixed(1);el.textContent=d>0?`+${d}kg`:`${d}kg`;
      el.style.color=d>0?"var(--gn)":"var(--red)";}
  });

  if(prData.length>1){
    setTimeout(()=>{
      const ac=accent();const gc="rgba(255,255,255,0.05)";
      const tc=document.documentElement.getAttribute("data-theme")==="dark"?"#f0f0f0":"#111";
      if(charts.pr) charts.pr.destroy();
      charts.pr=new Chart(document.getElementById("ch-pr"),{
        type:"line",data:{labels:prLabels,datasets:[{data:prData,borderColor:ac,
          backgroundColor:ac+"22",tension:.3,pointBackgroundColor:ac,pointRadius:4,fill:true}]},
        options:{responsive:true,plugins:{legend:{display:false}},
          scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+"kg"}},
            x:{grid:{color:gc},ticks:{color:tc,font:{size:9}}}}}
      });
    },100);
  }
}

function delPRRow(lift,idx,total){
  // Clear stored values for this row, shift subsequent rows up
  for(let i=idx;i<total-1;i++){
    set(`pr-${lift}-${i}`,get(`pr-${lift}-${i+1}`));
    set(`pr-${lift}-date-${i}`,get(`pr-${lift}-date-${i+1}`));
  }
  // Clear last row
  set(`pr-${lift}-${total-1}`,"");
  set(`pr-${lift}-date-${total-1}`,"");
  buildPR();
}

function isPrivacyOn(){

function togglePrivacy(){
  // Always require PIN — no session caching for privacy toggle
  if(hasPin(currentId)){
    pinBuf="";
    openPin("verify",currentId,()=>doTogglePrivacy());
  } else {
    doTogglePrivacy();
  }
}

function doTogglePrivacy(){
  const nowOn=!isPrivacyOn();
  set("__privacy__",nowOn?"1":"0");
  updatePrivacyBtn();
  applyPrivacyMask();
}

function updatePrivacyBtn(){
  const btn=document.getElementById("eye-btn");
  if(btn) btn.textContent=isPrivacyOn()?"🙈":"👁";
}

function applyPrivacyMask(){
  const on=isPrivacyOn();
  // Mask all .mask-target display elements
  document.querySelectorAll(".mask-target").forEach(el=>{
    if(on){
      if(!el.dataset.realVal) el.dataset.realVal=el.textContent;
      el.textContent="●●●";
    } else {
      if(el.dataset.realVal!==undefined) el.textContent=el.dataset.realVal;
    }
  });
  // Mask/unmask all number inputs
  document.querySelectorAll("input[type=number]").forEach(el=>{
    if(on){
      if(el.dataset.realVal===undefined) el.dataset.realVal=el.value;
      el.value="";el.placeholder="●●●";el.disabled=true;
      el.style.color="var(--mu)";
    } else {
      if(el.dataset.realVal!==undefined){
        el.value=el.dataset.realVal;
        el.dataset.realVal=undefined;
      }
      el.placeholder="";el.disabled=false;
      el.style.color="";
    }
  });
}

// ══════════════════════════════════════════════════════
//  V3 → V5 DATA MIGRATION
//  Reads old v3 flat keys (week1-Monday-bench-wt etc)
//  and migrates them into the new program key format.
//  Runs once per athlete, marks completion in db.
// ══════════════════════════════════════════════════════

// Old v3 day structure for Smolov Jr (Mon start)
const V3_DAYS={
  week1:{Monday:"6×6",Wednesday:"7×5",Friday:"8×4",Saturday:"10×3"},
  week2:{Monday:"6×6",Wednesday:"7×5",Friday:"8×4",Saturday:"10×3"},
  week3:{Monday:"6×6",Wednesday:"7×5",Friday:"8×4",Saturday:"10×3"},
  deload:{Monday:"3×3",Wednesday:"3×2"},
};

// Old v3 exercise list per day (matches v3 ACC_JOSH)
const V3_ACC={
  Monday:["Pec Deck","Skull Crushers EZ Bar","Tricep Pushdown rope","OHT Extension cable"],
  Tuesday:["Deadlift","Pendlay Row","Lat Pulldown wide grip","Cable Row close grip",
    "Rear Delt Reverse Fly","Face Pull rope","EZ Bar Curl","Incline Dumbbell Curl","Hammer Curl"],
  Wednesday:["Barbell Squat","Romanian Deadlift","Leg Press","Hip Thrust barbell",
    "Leg Curl machine","Leg Extension machine","Calf Raise standing"],
  Thursday:["Barbell OHP","Cable Lateral Raise","Face Pull rope","Rear Delt Reverse Fly",
    "Preacher Curl","Cable Curl single arm","Dips assisted","Cable Pushdown V-bar"],
  Friday:["Pull-up or Assisted","Lat Pulldown underhand","Single Arm DB Row",
    "Seated Cable Row wide","Cable Crunch","Hanging Knee Raise","Plank"],
  Saturday:["Chest Press Machine","Pec Deck","Incline DB Curl",
    "Cable + Hammer Curl superset","Preacher Curl machine","OHT Extension cable",
    "Pushdown straight bar + dropset"],
  Sunday:[],
};

async function migrateV3Data(athleteId){
  const data=db[athleteId]||{};
  const progId=athleteId+"-smolov-legacy";

  // If already migrated AND program exists in programs table — skip entirely
  if(db[athleteId]?.["__v3_migrated__"]){
    const already=(programs[athleteId]||[]).find(p=>p.id===progId);
    if(already) return; // fully done
    // Migration ran but program wasn't saved to programs table — re-add it
    const tmpl=PROG_TEMPLATES["Smolov Jr."];
    const prog={
      id:progId,athlete:athleteId,name:"Smolov Jr.",
      notes:"Migrated from previous version",
      template:"Smolov Jr.",weeks:4,is_primary:!(programs[athleteId]||[]).length,
      is_archived:false,
      data:{days:JSON.parse(JSON.stringify(tmpl.days))},
      created_at:new Date().toISOString()
    };
    if(!programs[athleteId]) programs[athleteId]=[];
    programs[athleteId].push(prog);
    await progSave(prog);
    console.log("Re-saved Smolov Jr program for",athleteId);
    return;
  }

  const hasV3Data=Object.keys(data).some(k=>
    k.startsWith("week1-")||k.startsWith("week2-")||
    k.startsWith("week3-")||k.startsWith("deload-"));
  if(!hasV3Data){
    // No old data — just mark done
    if(!db[athleteId]) db[athleteId]={};
    db[athleteId]["__v3_migrated__"]="1";
    await dbSave(athleteId);
    return;
  }

  console.log("Migrating v3 data for",athleteId);
  const tmpl=PROG_TEMPLATES["Smolov Jr."];
  const prog={
    id:progId,athlete:athleteId,name:"Smolov Jr.",
    notes:"Migrated from previous version",
    template:"Smolov Jr.",weeks:4,is_primary:true,is_archived:false,
    data:{days:JSON.parse(JSON.stringify(tmpl.days))},
    created_at:new Date().toISOString()
  };

  // Week mapping: v3 week names → week indices
  const wkMap={week1:0,week2:1,week3:2,deload:3};

  // Migrate bench sets (v3 stored as single wt/reps per bench day)
  Object.entries(wkMap).forEach(([wkName,wi])=>{
    ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].forEach(day=>{
      // Migrate bench
      const benchWt=data[`${wkName}-${day}-bench-wt`];
      const benchReps=data[`${wkName}-${day}-bench-reps`];
      const benchRpe=data[`${wkName}-${day}-bench-rpe`];
      if(benchWt||benchReps){
        // Find bench exercise index (always 0 in Smolov days)
        data[`p${progId}-w${wi}-${day}-ex0-sets`]="1";
        data[`p${progId}-w${wi}-${day}-ex0-s0-wt`]=benchWt||"";
        data[`p${progId}-w${wi}-${day}-ex0-s0-reps`]=benchReps||"";
        data[`p${progId}-w${wi}-${day}-ex0-s0-rpe`]=benchRpe||"";
      }

      // Migrate accessories
      const accList=V3_ACC[day]||[];
      accList.forEach((exName,exIdx)=>{
        // v3 accessories were stored as ex0,ex1 etc (offset by 1 for bench days)
        const v3ExIdx=V3_DAYS[wkName]?.[day]?exIdx+1:exIdx; // bench days: accessories start at ex1
        const wt=data[`${wkName}-${day}-ex${v3ExIdx}-wt`];
        const rps=data[`${wkName}-${day}-ex${v3ExIdx}-reps`];
        const rpe=data[`${wkName}-${day}-ex${v3ExIdx}-rpe`];
        if(wt||rps){
          // In new format, bench is ex0, accessories follow
          const newExIdx=V3_DAYS[wkName]?.[day]?exIdx+1:exIdx;
          data[`p${progId}-w${wi}-${day}-ex${newExIdx}-sets`]="1";
          data[`p${progId}-w${wi}-${day}-ex${newExIdx}-s0-wt`]=wt||"";
          data[`p${progId}-w${wi}-${day}-ex${newExIdx}-s0-reps`]=rps||"";
          data[`p${progId}-w${wi}-${day}-ex${newExIdx}-s0-rpe`]=rpe||"";
        }
      });

      // Migrate session notes
      const notes=data[`${wkName}-${day}-notes`];
      if(notes) data[`p${progId}-w${wi}-${day}-notes`]=notes;

      // Migrate done flag
      const done=data[`trained-${wkName}-${day}`]||data[`p${progId}-w${wi}-${day}-done`];
      if(done) data[`p${progId}-w${wi}-${day}-done`]="1";
    });
  });

  // Write migrated data back
  db[athleteId]=data;
  db[athleteId]["__v3_migrated__"]="1";

  // Save program to programs table
  if(!programs[athleteId]) programs[athleteId]=[];
  // Only add if not already there
  if(!programs[athleteId].find(p=>p.id===progId)){
    programs[athleteId].push(prog);
    await progSave(prog);
  }

  // Save migrated db
  await dbSave(athleteId);
  console.log("Migration complete for",athleteId);
}

  }
